body:
  text: 頤庵文選卷上明胡儼撰賦述志賦嗟豫生之忽忽兮倏侵尋以就衰老冉冉其將至兮素髮颯以埀絲遵先人之遺則兮恆兢兢以自持顧豫力之不足兮徒念兹而在兹慨前修之日逺兮惟古訓之是求呻占畢於朝夕兮又懼夫輪扁之見咻肆超遙於策府兮恣逺覽而旁搜日遑遑而不逮兮心切切而怛憂道愈逺而莫反兮策跛牂於梁輈津浩浩而弗濟兮渺傾波於洪流豫既望洋而趦趄兮退却步而返顧恐佳期之遲暮兮羌回車以復路恥沒世而名不稱兮漫馳騁於空言茍余情其信美兮何雕蟲之刻鐫掃枝葉與葩華兮求根柢於本原彼源泉之混混兮曾不舍夫逝川魚淵泳而鳶天飛兮夫孰使之然覩豁然而呈露兮披雲霧於青天反諸躬而欣欣兮抑非言之可宣茍日新而弗已兮亶澡雪而潔鮮日惴惴如臨深兮匪一息之可捐竊獨處而韜匿兮愧暗然而日章顧虛薄之淺鮮兮孤衆人之所望惟黽俯以從事兮曾何有於寸長日居月諸兮孰悲豫視之茫茫歌伐檀以內疚兮知素餐之無補閔豫心之日負兮守一室於環堵對庭槐以延佇兮聊逍遙而容與東軒賦承聖皇之臨御兮運熙洽而穆清念宅中以圖治兮即國都而作京忝縉紳於侍從兮又從事乎藝臺近直廬而卜居兮蔭矗矗之古槐衆方謂豫之隘陋兮豫獨安於所寄復闢地於西偏兮就青陽而面勢廣不踰乎尋丈兮僅風雨之可蔽瓦鱗次而壁垣兮匪雕斫之所製牖疏豁而嚮明兮納晨光於迢遞室固密而靜幽兮絶風埃之障翳惟圖書之在列兮逺俗務之紛拿徒竊祿於蕭散兮幸朝夕以自娛昔安仁之栖遲兮侈樂事於間居子由出而營職兮則又窘束夫鹽沽獨顔子之陋巷兮恆坦坦以自如夫子既嘆其賢兮流不朽之美譽豫景仰夫先哲兮審容膝以自安日黽俯以就列兮豈碩人之考槃退舒舒而即休兮樂欣欣而忘餐感聖恩之嘉惠兮曾何補於寸分愧茍延夫歲年兮聊泚筆乎兹軒滕王閣賦翳仙李之盤根布柯條於區宇既命爵以錫圭遂分茅而胙土惟滕啓封實介鄒魯爰來豫章督郡開府山川秀靈人物蕃廡星麗斗牛地兼吳楚據百粵之上遊壯雄藩之重輔朱門畫戟號令肅乎風雷繡闥雕甍詩書被乎閭里誠東南水陸之都會古今人材之淵藪宜乎王公之所臨處也想夫端居多暇深宫日長圖書既厭琴瑟倦張中心不愜積思浩穰乃命輕駕肅冠裳擁髙牙驂乘黃俯郊郭耀旗常六轡總總八鑾鏘鏘騰吹長阪弭節高岡江山相望鬱乎蒼蒼既遊目以騁懷遂欣欣而樂康於是戒梓人程匠石相陰陽表區域奠方位於髙明燔災翳於蓬藋輦杞梓之良材斫巖巒之秋骨締構費於經營精神妙於規畫巋然傑閣成功不日觀其臺榭凌虛簷牙翬飛碧忩瀟灑彩檻逶迤際平沙兮浩浩撫長江兮漪漪謝氛埃於物表接莽蒼於天涯逺煙積兮凝黛空翠生兮襲衣碧瓦華榱青山隱隱丹楹藻棁緑樹依依錦纜牙檣兮璀璨鶴汀鳬渚兮參差至若春日載陽花明柳碧素練澄江長天一色薰風島嶼渺孤鶩於落霞野水蒹葭亂白鷗於飛雪啼鴂送半山之夕陽征鴻橫千里之明月地位絶湫隘之炎歊房櫳隔高寒之凛冽四時朝暮光景明滅於以宴樂於以遊息或憑高以暢神情或望祲而書雲物帶彭蠡之渺茫挹華峰之秀特列閣皂之雲屏倚洪崖之丹壁招五老於匡廬納九江於几席呼君山之紫髯吹洞庭之玉笛吞雲夢兮八九曾不芥蒂於胸臆賔從光兮羅綺陳簫鼓咽兮歌舞新遏行雲兮動梁塵玉顔酡兮玉杯側美人醉兮嬌艷春一旦事闌人去物換星移樹閻公之棨戟聳王勃之文詞朱簾埀兮雨冷畫棟黯兮雲飛對樽前之潭影目檻外之波馳濡毫授簡蓋已太息於當時余嘗泛舟章江繫榜南浦訪故老以遺蹤指蒼苔之斷礎古木號兮西風芙蓉悴兮夕露壞堞鴉飛淡煙蛩語宿草迷隄殘碑仆土佩玉兮鳴鑾音塵兮何許惟江上之西山見君王之歌舞粲采采之黃花空蛺蝶兮栩栩繼三王之文雅擅後來之韓愈仰巴山之故亭與丹梯而並峙竹色兮松聲凄涼兮杜甫余乃浩然興懷惻然悽楚樂極悲來豈惟斯故追往事於亡陳亘臨春與結綺藹香風於沉檀極人間之麗美何啻百倍於斯閣終亦凋零而銷毁矧楊氏之四香又驕奢而侈靡彼氷山兮莫悟竟何足以比數並漂搖於瓦礫而同鞠為榛莽矣獨河間之禮樂暨東平之徽媺著藩屏之良規流芳馨於青史顧賢否之異塗徒感慨於千古續月中桂賦并序天朝造命之初選任舊德鄱陽程國儒以前進士來守南昌喪亂之餘急於求士乃舉行賞試命題校藝先伯父虞部府君治書經先祭酒公治春秋各以其業就試中場賦題乃月中桂也虞部遂魁多士先公亦在髙選當時同輩翕然嚮風儼少時閲家集常誦二賦不勝企慕及今侵尋暮景而加以衰疾追惟先德往來於懷恆懼不肖以墜厥緒於是力疾勉為續賦一通非敢以紹夫遺芳將使後之子孫見之庶幾知祖宗詩書之澤不泯也其有志者能無激昻於斯乎粵有靈木匪土而株託根月窟輪囷扶疏不春而榮不冬而枯與天地兮始終哀衆芳兮須臾枝連蜷兮相繚葉蓊鬱兮交敷日回旋乎后土夕覆被乎寰區想夫一氣未判大化胚胎陰陽既肇不假栽培霧滃雲蒸緑茁青荄東皇資始於玉燭西昊司成於瑶臺聳丹霄而修直依紫垣而徘徊拂列宿兮不披徑周天兮往來婆娑偃蹇玲瓏隂森風雨不震寒暑不侵氤氲磅礴孰古孰今華不淪於朓朒德每同於照臨若夫斜河左界長空一碧寶殿風清璇階露滴粲金粟於廣寒散天香於八極滄海鏡兮波澄瑶池瑩兮霜白天上悠悠人間寂寂玉宇瓊樓今夕何夕乃有羿后靚粧素娥妙舞霓裳初奏羽衣乍舉度曲調均諧律詣呂縞鶴離巢以回翔白鸞出林而軒翥影湛碧於蟾宮實粉丹於兔杵望舒逍遙而御乎氷輪吳剛徙倚而收其玉斧余乃求神農之遺經訪華陽之真逸為言性味可以服食雜芳椒以調珍化雲母而為液駐容顔如嬰童壯筋骨如金石殺三蟲而安五臟滋元氣而理百脈神仙不老於人多益矧兹仙種又非凡木之所能匹方其浥沆瀣混青赤育太和流潤澤雖玄圃蟠桃六千年之花實楚南靈椿八千歲之春秋曾不為之瞬息又若扶桑髙標交柯屈鐵若華芬敷盤根錯節敻不可齊廣不可潔曜靈舒光萬古不滅曾不離乎土壤抑何有於高潔余既獲聆緒論反覆紬繹固若得其要領終莫究其底極疇昔之夜夢遊册府挾天風而上征憩仙槎於銀渚叩鈞天之帝庭接廣樂於萬舞於是歷太微抵營室入文昌披桂籍過勾陳謁太一跽敷袵以陳衷耳玄微之歷歷曰子實縉紳博究儒術豈不聞厥初無形馮馮翼翼輕清上浮蒼蒼其色重濁下蟠混混其質陽精為日陰魄為月月受日光含精載魄麗天九行循環一轍從風從雨各以其節三五而盈三五而缺猶寶鑑之懸空表虛明而照物亦隨物而賦形洞陰精而襲翕何者為桂付之一吷余遂恍然而寤罔然如失敬泚筆而攄詞將以解古今之惑心既暢兮神融復擊節而為之歌曰有物翳翳兮當月中影婆娑兮流太空歲復歲兮夜復夜莫知其始兮曷究其終我欲訊之兮超鴻濛虹橋渺兮將焉從徒慷慨兮吟秋風感寓賦茫茫堪輿萬物並作動植飛潛氤氲交錯人生其間眇焉棲託知誘物交紛紜揮霍劌目怵心神銷精爍白髮漸疏紅顔匪昨日居月諸悠悠罔覺若夫翩翩公子乘軒駕鶴身都貴富勢傾山嶽入則髙居廣厦重樓傑閣粉黛爭妍蘭房蕙幄佳賔滿堂緑樽翠勺吹竹彈絲千金一謔出則流水滔滔遊龍濯濯玉勒雕鞍文茵繡襮鳴騶夾道衢開市却意氣揚揚光動城郭人生至此云胡不樂一旦樂極悲生意闌情索雍門張弦引商扣角凄凄切切澘然淚落至若窮櫩蔀屋圭竇蓽門蒼苔迷徑宿莽充園一室懸罄十畝荒榛衣重百結食不加餐丘無束帛里絶來轅皚皚雪積蕭蕭雨殘東郭履敝黔婁衾單稚子懷飢老妻啼寒原生環堵兮寂寞榮叟帶索兮蹣跚栖栖賤貧孰與溫存乃有文士修飭藴美含章積仁潔行顒顒昻昻牙籖插架緗帙連床青燈雪案緑幕秋堂髙詠風雅上窺虞唐錦肺繡腑發為文章接芳塵於賈董攀逸駕於班揚於是鶴書遙赴驥足髙驤躡青雲而步武歷天衢而翺翔建功業於當世埀勳名於旗常亦有窮年矻矻白首山林抱兔園之册聚車囊之螢舂會稽之市鼓犢牧之琴老欷歔兮侘傺志一鬱兮沉吟至如服勤耒耜浮載舟車劬劬畎畝泛泛江湖萍蓬秋思煙雨春蕪塵土壓貂裘光隂歎白駒復有乘時規利坐守廢居百工肆列有無相須夙夜孳孳卒老其區或山而樵或水而漁或驅而牧或負而趨同寓形於宇內恆役役於朝晡又若桑門空寂羽士清虛祇園鷲嶺方丈蓬壺衲衣香冷鶴駕雲孤對黃花兮微笑見碧海兮塵枯嗟乎物不可齊道不可虞蜉蝣短晷殤子夭殂夀同金石亦有時渝孰隕而穫孰昭而蘇同歸於化茫茫堪輿重曰已矣古往兮今來春與秋兮迭催逝者兮如斯慨馳波兮不回時不我兮淹留徒偃蹇兮低徊天髙兮地厚紛玄黃兮形色至人兮無纍大化兮穆沕合散兮杳冥雖聖神兮莫測陽春賦佳哉春之為氣也沖瀜兮堅氷解沍而流澌飄忽兮東風淡蕩逺山橫碧含清暉低徊兮攝提貞於東方浩浩兮太皞乘震而司芒蟄居户而始振兮鴈嗈嗈而北鄉繄草木之奮茁兮倏甲拆而勾萌鶯出谷而遷喬兮桃夭夭而始華鳦翩翩其來歸兮就棟宇而即家何柳絮之盈盈兮悠揚漂泊乎天之涯蹇余之獨處兮耿惝恍而無鄰見鳴鳩之刷羽兮感戴勝之知春雨霡霂而土膏兮欣原隰之畇畇農秉耒以舉趾兮期有秋而服勤日遲遲而載暄兮女微行之是遵求柔桑與白蘩兮逮女紅之維新嗟余生之矻矻兮徒策名於縉紳希論世而尚友兮陋占畢之吟呻時亹亹而逾邁兮老冉冉其逡巡攀前哲之逸駕兮竟駑駘之後塵吁嗟乎洪崖蒼蒼漳水湯湯有仙人兮紅蕉之裳望不見兮煙霧長渺渺兮玉笥白雲兮故鄉春雨露兮既濡眷松楸兮不能忘藂菊賦凛素秋之佳節兮天宇廓而髙澄何衆芳之搖落兮覩斯菊之獨榮葉湑湑以流潤兮枝扶疏而紫莖粲芳華之承檻兮揚靃靃之繁英凌清霜而擢秀兮育太陽之真精雖駢羅而雜遝兮喜蕃廡而各遂其生玉盈盈以瑩質兮金煌煌而耀晶錦半舒而絢彩兮霞欲收而流赬鷺埀絲而欲墮兮鶴凝丹而不鳴羽迎風而初翔兮杯擎露而乍傾儼西子而靚粧兮度響屧而娉婷豈太真之新浴兮出華清而猶未醒將洛川之宓妃兮步羅襪於清泠抑漢皋之神女兮援明珠而含情兹世俗之所喻兮匪君子之德馨繄翠袖之嬋娟兮倚素蛾於修竹羣真肅肅而臨軒兮爍流金於佩玉羌皎皎以潔修兮白駒在彼空谷抑素履之坦坦兮嫓幽人之貞獨紛既儷此衆美兮亶吾遊乎瑤之圃擷芳馨以翺翔兮將以遺乎逺渚山蒼蒼而雲冥冥兮悵緑蘿之煙雨招柴桑之逸老兮攜三徑之壺觴挾天隨與坡翁兮續杞菊之後章靈均亦既餐英兮何自苦而沉湘惟老圃之秋容兮抱晚節而自芳飲菊潭之甘潤兮日欣欣而樂康重曰稟幽姿兮潔以清挺玉秀兮含金精虛堂靜兮月色皎中庭凄兮朝露零流光馳兮歲將暮鴈嗈嗈兮蟬無聲耿獨處兮抱貞素心惝恍兮誰為榮涼颷兮振衣芳菲菲兮欲披物有盛兮必衰嗟人生兮幾時激清商兮浩歌聊泚筆兮攄辭遊匡廬山賦昔神禹之疏鑿兮奠山川於九區惟彭蠡之既瀦兮渺巨浸而為湖爰有山而西峙兮儼穹窿而覆廬彼何人之字季兮初卜居而宅其陽詢遺老而求其故兮傳其姓而曰匡余於是招五老於雲中兮參九真而翺翔攬香爐之紫煙兮濯飛瀑於石梁挽銀河於九天兮凌倒景之蒼茫雙劍倚空而嵳峩兮凛肅肅之秋霜俯龍淵於絶壁兮㵼碧澗之琅琅漱玉挺乎長松兮慨故址之荒涼掃蘚斑而求古迹兮信德美其流芳歘凌風而遐舉兮抵尋真之舊觀徑松蘿而歷九竒兮覩雲屏之煥爛天宇豁其澄鮮兮聳層巒於霄漢氷簾三疊而下埀兮倏瓊飛而珠散羌觸坎而轂轉兮懸素絲於天半回風搏而混結兮炯雪毬之洞貫邀謫仙於松巢兮扣東林之禪扃倚三笑而長吟兮聽虎溪之泠泠升上方而登天池兮跨絶頂之髙寒靈籟發而凄清兮悚萬壑之驚湍鳥咿嚶於幽谷兮猿悲嘯乎巑岏熊咆龍吟之不可以留兮接空明之羽翰巨艦突而撑空兮何神化之渺漫披蒙茸而陟虎豹兮仰石磴而髙攀坐飛閣以延覽兮付江山於一瞬紅葉忽其翩翻兮猶雨花之亂隕訪竹林之古寺兮云隱顯之靡常流鐘磬於巖竇兮顧杳靄兮何鄉俯盤盤之深谷兮綺繡錯而錦張過淵明之栗里兮三徑沒而已荒挹髙風於千載兮攀逸駕於羲皇余思夫古人而不得見兮撫孤松而倣徨望白雲之悠悠兮攬紫霄之蒼翠迎鸞鶴於空中兮驂羣仙之環珮臨墨池以揮灑兮希右軍於絶代酌鸞溪之一滴兮亦何有乎滯礙道簡寂以遨遨兮仍羽人於丹丘陸子肅余於石壇兮耿星河之欲流余既縱夫玄覽兮羌回車以復路度松關之迢迢兮問棲賢之故處乃少室之山人兮甘嘉遁而來居抑後賢之仰止兮藏簡册於奧區振吾袂於髙岡兮挾天風於兩腋鹿呦呦而思芩兮闖紫陽之遺迹洞含呀而隱約兮山幽幽而無人葛漫漫於樛木兮石磊磊乎澗濵堂構餘乎瓦礫兮蛩愀吟而飢鼯呻余既感此而惆悵兮除積翳於榛荒採蘋蘩於沼沚兮就堂階而薦觴退即乎風泉雲壑兮聊詠歌而徜徉衆既告余以欲暮兮還余駕乎東騖蟬嘒嘒而寒鳴兮草萋萋其夕露松陰陰而月朦朧兮渺蒼蒼之煙霧亂曰汨吾遊兮北征水茫茫兮山青稅吾駕兮匡廬訪古迹兮窮奧區山之人兮潔修跨黃犢兮夷猶灑清風兮六合凛氷玉兮髙秋歸來兮歸來求山人兮林丘歸休賦嗟余生之蚤衰兮憯風淫之見侵臂牽聨而痿痺兮足蹣跚而不任薰蘭湯以滲液兮醫又告余以焫針何盧扁之不遇兮遂淪浹而日深爰削籍於金閨兮耿宵寐而沉吟荷聖脊之不遺兮御西清而趣召肆奔趨而不俟駕兮羌及戶而振掉違天顔於咫尺兮聖情為之惻愴竟沉綿而伏枕兮鑾輿邁而陟方攀龍髯而莫及兮望蒼梧於渺茫八音遏密以拱聽兮咸仰戴乎重光余恐溘先於朝露兮悲年歲之不吾與託金蘭以陳詞兮猶眷留而弗許心􅍵􅍵而靡達兮日矯首而延佇倏上公之並臨兮致丁寧乎天語繼三接而拜貺兮使命紛其旁午龍章粲而昭回兮儼宸旒之當寧竊榮名而久妨賢兮知素餐之無補叨寵恩而撫已兮輒懷慚而悽楚余既感此離别兮復遲遲乎其去也出都門而踟躇兮抑惟靈修之故也駕扁舟而揚帆兮泛潞河而超渤海正春陽之發舒兮萬彚􅎡乎其光彩樹冉冉而飛花兮山蒼蒼而􅐑嵬水馳波而東注兮草萋萋兮煙靄歷古迹而策短笻兮吊昔人乎安在牛羊牧豎以躑躅兮徒以增夫一慨過汶泗而浮淮兮泝大江而南征神州龍蟠而虎踞兮佳氣鬱蔥而晶瑩指彭蠡而徑度兮招五老於空青如願辭余而不返兮問葛洪之舊盟遵石頭而夜泊兮曉入乎豫章之故城童稚笑而牽衣兮揖父老而歡迎何日月之不居兮又宫車兮晏駕念同軌之畢至兮復倉皇而東下川迢迢而風颼颼兮曾不舍夫晝夜謁二陵於天夀兮淚橫流而交頤神陟降於鈞天兮覩新宫之巍巍皇仁閔余之驅馳兮抑又懷乎宿昔顧衰颯之不可以留兮乃渙頒乎寵錫恭承嘉惠兮余豈懷寶而深藏老驥猶戀乎君之軒兮徒偃蹇兮不可以騰驤衆翺翔乎天衢兮獨回車以復路朔風振乎潞亭兮凛河氷其交沍悵淹留於州侯兮勤館人於旦暮獻歲發春兮聆蒼鳩之先鳴酒崇觴而肉載俎兮感驪駒於諸生風飄飄而吹衣兮順滄波而揚舲歷舊遊而周覽兮亦竊愧乎余生之營營駐余棹於章江兮水泠泠而山明造先人之故廬兮越歲久而增敝蠨蛸罥於戶牖兮簡册封而塵翳卜幽隱以栖息兮得遺構於南郊疏清池而築圃兮亟燔椔而剪茆俯遊魚之圉圉兮接黃鳥之交交雉斑斑而將雛兮鳦翩翩其來巢樹陰陰以連徑兮花藿藿而承條枉鄰曲之壺觴兮庶以慰余之寂寥余既安於所寓兮逺井邑之紛囂彼不諒余之中情兮反輒謂余之孤高余素懷乎耿介兮匪時俗之所能移聊逍遙以夷猶兮時矯首而遐思美人渺乎河漢兮隔盈盈之秋水寫離鸞於孤桐兮抱明月而延企君子戒乎素行兮惟益勵乎餘齒亂曰已矣哉日居兮月諸人生兮須臾何鬱鬱兮煩􅀈安素履之坦坦矢余心而弗渝述夢賦登髙樓之崔嵬兮軼氛埃於層霄天宇廓其洞虛兮際空明於泬寥綺忩珠綴紛玲瓏兮風肅肅而下飄覩真人於玉臺兮乘彩鳯而逍遙披絳霞而進謁兮蹙然閔余之瘠磽啓靈文而欲授兮顧塵昏之未銷既食余以麟脯兮又飲之以醇醪琴髙鼓以清瑟兮飛瓊泛其雲璈邀王喬而宿之兮吹參差於鳳匏何處子之綽約兮姱修眉而峩翠翹肅斂容而不敢訊兮歘凌風而高超余惝恍莫知所如兮王子導余以遊遨挾光景以凌厲兮薄星辰而上朝撫扶桑之東枝兮攬若木之髙標駭神鼇之贔屭兮天吳出而舞潮方遊鯤之擊水兮倏鵬翼而扶搖振余袂於千仞兮晞余髮乎陽喬升昆崘而餐玉英兮渺瑶水之蕩潏金堂閴其無人兮悲蟠桃之不實駕青虬而髙駝兮過方諸而一息珠宫貝闕嵳峩兮蔭玉樹而蕭瑟接飛仙之冉冉兮慨弱流之無極盧生去而不返兮海若誇於河伯陋夸父之不知止兮哀愚公之又惑召荼壘於杜索兮截雄虺之九首擲封狐於萬里兮顧夔魈乎何有命庚辰於淮涘兮紲支祁於龜山猰㺄殪於青丘兮檮杌逐乎荆蠻豺虎深藏而遁迹兮蛟螭匿蟠乎重淵攬余轡以儃徊兮飄然遊乎瑶之圃步春臺以夷猶兮覩鈞天之萬舞幸余逢此休嘉兮內欣欣而和煦羌回車以復路兮順凱風而曾舉山窅窅而雲冥冥兮佳木秀