所謂物理性命者具於皇極經世之書概可見矣程伯子嘗言推其源流逺有端緒然自邵子沒而其傳泯焉蓋其自得者汪洋髙大非淺之為儒者所可窺也余嘗聞諸鄉先生言有元臨江杜清碧先生博學多聞深探皇極經世之旨然余生後不及見先生莫知其底裏及得其懷友軒文讀之信乎博洽之君子也後又得其與鄉先生講論有曰以萬事合為一理以千載合為一日以天下合為一心以四海合為一家則可制禮作樂而躋三五之盛信乎有得於皇極經世者矣今其孫德機以思紹名堂蓋有志於先業能賦者既詠歌之復來徵余序嗟夫皇極之書雖存而性命之理甚微宏博之學可充而克一之妙難會然則若何而紹其業也亦曰思而已蓋思曰睿通乎微者也德機其勉之庶幾克肖焉元宵唱和詩序史記樂書載漢家常以正月上辛昏夜祠太乙甘泉徐堅謂今人正月望夜張燈是其遺事或云漢武祭五畤通夜設燎此張燈所由起也後至唐宋有弛禁放夜之令其事遂盛由此而言世以元夕為燈節其來久矣大抵朝廷無事區宇寧謐民殷物阜而天下之人得以安其燕遊無淫佚之侈則太平熙洽之化於此亦可見焉今年春正月十五日左庶子兼侍讀永嘉黃淮宗豫設宴為觀燈之會入夜酒酣光彩照席芙蕖牡丹根株葩葉爛然乎樽俎之上縉紳在席者咸詠以詩而右庶子兼侍讀廬陵胡光大為之倡且以序屬余余惟古之君子日用興作嘗有玩物之戒若嵇康之鍛阮孚之屐桓伊之笛顧愷之之畫非不傲世絶俗然未免酣溺於物而吾宗豫之意豈在斯乎誠以聖天子在上天下康寧吾徒竊祿於朝雖無禆於治化然幸以文字為職業乃得優遊於侍從之間者皆上之所賜也今兹休暇撫時燕樂而觴咏勸酬竒藻遞發豈不可以敘朋遊之好鳴國家之盛矣乎得詩若干首遂為之序云送趙季通調北京國子司業序師道之不振久矣至元為甚余聞諸鄉先生云虞文靖公嘗言初元之建學也自許文正公是時風俗簡略人材朴茂文正因時立教一時士類多所造就許公歿而學政寖弛師道日廢及吳文正公來為監官慨然思有以作新其人而又以浮議鼓扇公遂不愜而去他日有戚里為司業者諸生羣然舉張子過此幾非在我之言為問戚里出倉卒未能即對連曰幾非諸生遂以此語榜其座繼而魯公子翬與虞公來掌教事始教之日諸生有寫東坡洗兒詩於行舍壁間詩中有愚魯二字意蓋含誚二公也其驕蹇傲誕類如此可勝道哉我太祖髙皇帝以天縱之聖膺君師之任深知其弊故於建學立師凡若此者一切禁戒而痛絶之本道德以為之訓通典禮以為之法嚴教條以示之約束品節防範周至詳密俾過不及者一歸於中正故為師者得以振其紀綱為弟子者得以安其禮分數十年間名卿材大夫士彬彬輩出而人材治效之盛邁於前代逺矣皇上聰明睿智治定功成首幸太學御筵講經文武就列環橋門觀聽者動以萬計聿新乎文教光昭乎鴻業繼志述事又有以超軼前代者也天台趙季通先生於時為博士嘗被恩榮矣今以司業調北京胄監掌其監事登圖書於舟遂祖餞於道六館師生送之江之滸有揖而言者曰司業往矣公可無言乎余曰趙先生之德之才聖天子所簡拔人之所共知何待言耶雖然余又嘗聞昔安定胡先生掌太學以法度檢束士初其徒少能安之久乃化服數百年間士君子論能振立師道者安定其人也故君子所為不求近效當要其成要其成古有其道古之道亦曰嚴師為難師嚴然後道尊先生持此以往鑒前代之所失體皇上之至意遵太祖之成憲與其君子日從事於詩書禮樂講明乎堯舜禹湯文武周公孔子之道振起乎斯文以淑諸人以行諸世庶上不負君命下有以慰士子之心先生往矣余日望之金諭德北征詩集序永樂八年春二月聖天子親駕北庭御羣帥以統六師問罪邊塞維是扈從之臣妙選將相大臣暨文武之士右春坊右諭德兼翰林侍講金公幼孜與學士胡公庶子楊公實在帷幄秉代言之政儼與户部尚書夏公時被命留北京鑾輿之發拜送於郊見吾幼孜烏帽貂裘腰弓服矢馳馬於屬車萬騎之中莫不壯其志而榮其行也及皇師奏凱而歸幼孜乃出示北征詩集屬余為序余誦之凡若干首道路之所經風氣之所接山川關塞之所登覽雲霞草木霜露晦明之景與凡師徒之次軍容之盛既得以吐其竒氣見之咏歌矣至於沐道德之光贊謀謨之密親際風雲之會而發揮乎敵愾之義詞雄句傑富麗鏗鏘有以逺揚天聲如金鐘大鏞震乎寥廓之外而光前振後者有非他人所得與也故是編之作非特寫一時榮遇而已蓋將紀千載不朽之盛事而傳之無窮焉幼孜之志亦或在此乎後之覽者固將有得於斯文敬序以辨其端楊氏清白堂詩序右春坊右庶子兼翰林侍講建安楊公勉仁以清白名堂蓋有取於其先太尉震之言砥礪自修將以振起其聲光紹述夫先志學士胡公光大既為之記賢士大夫又歌詠之而屬余為序余嘗登勉仁之堂虛明爽塏四壁之間灑粉為圖松篁山石之觀清敻蕭森之意超然乎塵埃之外如即山林幽栖之境翺翔以遊焉乃展席焚香清談煮茗絃琴賦詩引觴命酌賔主之間暢然而適陶然而樂油然而忘乎日之夕也清風灑衣明月在庭景與心會物我齊冥余顧勉仁曰斯時也不知堂之清白人之清白也勉仁曰即斯可以推吾名堂之意矣太虛寥寥纎翳不生八荒洞徹無有彼此無物以為之纍也靈臺湛然虛室生白何思何慮表裏如一無欲以為之纍也吾觀古之君子富貴不能淫貧賤不能移臨乎憂患顛沛之塗卒不以動其心者志有在焉彼汲汲於生業營營於貨利將以為子孫後世計者之所為也先太尉凛然四知之畏所以遺子孫者在此而不在彼也嗟乎慕紛華者不可與樂道酣嗜欲者不足以貽謀勉仁承先世之餘休際國家之興運為聖天子侍從之臣鏘金鳴玉從容廟堂論思黼黻以贊皇猷然猶孜孜夙夜檢身飭行惟恐弗逮宜其表揭先訓存乎心目出入省觀而不敢忘也詩曰無念爾祖聿修厥德勉仁有之由是而之焉所以繼先志而益振其聲光者寧不在兹乎羣公之什粲若貫珠顧余不敏序以為引冰雪軒詩序天地間物之至清至潔者無逾於冰雪而君子尚焉將以育德勵行也然冰雪不常有而君子清潔之志意無時而不存以無時不存之志意寓於不常有之物此吾友諭德金公幼孜冰雪軒之作意蓋有在焉幼孜之來北京也其居當闤闠之中車馬往來市聲逺邇雜遝而相聞每退自玉堂燕休之際思有以屏其塵囂接乎髙明乃於所居東偏闢一室堊其中疏其牖以納乎天光日華暨風月之夕皎乎如在冰雪中幼孜欣然有得告於素所往來者各賦詩以詠之屬儼為之序君子居室日用之間有銘焉有針焉揭其操存省察之要以警戒其怠惰燕逸之私而操修之實德與行而已德之明光輝而日新同夫雪之潔行之純貞固而不汚類夫冰之清如此則志之所之意之所存無所往而不清無所往而不潔而兹軒之扁亦猶盤之銘座右之針豈徒尚其虛白也哉抑余聞幼孜先公嘗以雪崖自號德義著於鄉邦凛然有古君子之風人稱之雪崖先生幼孜佩服先訓立身行已循循然無遺而清修潔廉可謂善承其家者矣士大夫擬之劉凝之父子昔凝之父子以德操重於當時蘇黃門謂其人冰清而玉剛鄉之長老遂以名其堂所以表見於後世者至於今不泯也然位不滿其德君子惜之今幼孜為聖天子侍從之臣以文章黼黻乎至治雪崖得推恩贈奉直大夫右春坊右諭德存歿光榮為幸至矣凡造兹軒者朗然如遊山林冰雪之鄉清興之發有不能自己故珠玉之富盈於篇翰而其事之美將垂不朽豈直為一時詠歌而已哉友桐軒詩序金川之玉峽毛咨詢其先吉水人父省夫為陳氏贅壻始徙今居咨詢性嗜琴以友桐名其軒今年秋領鄉書將之京求賢士大夫之賦詠先余為之序夫琴者古先聖王之雅樂君子無故不去蓋取其中和之音養吾中和之德動蕩血脈流通精神格神人和上下移風易俗合於八音宜乎君子之所尚也余少時亦嘗從事於斯承顔奉歡之際先祭酒公聽之嘗曰吾聽白雪有八荒無塵萬籟俱寂之意聽春江有波濤浩蕩魚龍鼓舞之勢聽歸樵有伐木丁丁山鳴谷應野猿幽鳥之音聽佩蘭有楚江湘浦和風麗日幽人詠士之興聽夢蝶有蘧蘧栩栩齊物之心聽御風有憑虛欲仙泠然善之感於離騷楚歌則如逐臣慕君勇士赴敵慷慨不勝其情也於長清短清則如雪天清曉風鼓瓊林鏗鏘之振乎寥廓也於水雲則有擊空明泝流光放棹滄浪之樂於大雅則黃鐘一鈞始終條理有太羮玄酒之味獨於秋鴻如萬里關山黃雲白草銜枚入塞風回電馳霜降水落月冷江空團沙依渚嘹嘹嚦嚦顧侣呼羣超然逺舉而琴於斯為盛乎又嘗承乏禁林得侍太宗文皇帝於武英進講之餘帝命出響泉親鼓南薰之操繼之以猗蘭之曲和鳴肅雍宣暢道德遊魚出聽於金河龍媒仰秣於天廄感通之至鳳儀獸舞品物咸遂於今三十餘年矣儼自嬰末疾手足不仁每對桐君不能一加指於氷絲之上追憶君臣父子之間悵然今昔不覺涕淚之交零也咨詢以英妙之年得琴中之趣而又取以為友迥然拔乎流俗而便僻便佞者斯逺矣雖然君子之取友不止於斯也自鄉而國而天下所以輔仁成德者必有其人焉以友鄉國天下之士為未足又仰思乎古之人論世尚友又必有其人焉不然歸而求之若先尚書之事業侍御之風軌神童之文學皆子孫之所當繼述者咨詢勉之至於吐珠玉振琳琅則有待於能賦者云友竹詩序江陰朱紹善繼性嗜竹其室之左右前後皆種竹其家居未嘗一日不與竹接也因得蘇長公墨竹一枝遂自號曰友竹持其卷告余曰將謁諸公詩敢請序之余諗之曰朋友彛倫也凡人之取友或以義好或以仁親或以文會或相須以考德或麗澤以成業故載之於易詠之於詩列諸經傳聖賢之教昭昭矣夫竹植物也無是數者子友何取於竹焉善繼曰取友以義以仁以文與夫考德麗澤者此紹日用所不敢廢也然人各有尚焉若淵明之於菊和靖之於梅濂溪之於蓮魯直之於蘭其志固有在也獨竹世之君子尚者衆矣若衛武公蔣兖州嵇中散王子猷袁丹陽之徒豈直玩好之謂哉紹嘗觀夫卉木之中春生秋零朝榮夕瘁者有矣竹獨四時而不改余則友其貞固也揉而曲鬱而軋者有矣竹獨直而不撓余則友其中立不倚也擁而拳窒而塞者有矣竹獨中空而通理余則友其虛心而受益也柔而脆夭而折喬而腐者又有矣竹獨徑節端操凛然乎氷雪之中余則思夫砥礪友其名節也夫是數者紹之所友也求之夫人事或不備焉人固有疑紹斯名者公知言故以序請余復之曰孟軻氏有云一鄉之善士斯友一鄉之善士至於一國天下以友為未足又尚論古之人善繼於斯盍亦頌其詩讀其書論其世反諸其躬以求底夫其極則取友之道豈徒一物而已哉善繼之祖子升故元時為紹興幕官有能名善繼今以才舉將有祿位非荒間栖遁者比余故告之以是焉幸勉而求之他日措之行事必有可觀者矣竹泉詩序朱積善慶江陰人也家居文林里承先世之業疏泉種竹以自娛因號曰竹泉示志也其兄善繼以仕進來京師求賢士大夫為詩文以表章之且屬余序萬物生天地間草木之用於人最切凡食飲衣服之須宫室什器之材無不資焉而草木之生又有資於水泉矣夫人之資其用者衆然取其類以擬德者必清修雅潔之士乃能之故菉竹興君子之學左泉賦衛女之思豈徒然也哉亭亭森列蒼翠玲瓏散緑陰於三徑來清風於一室徑節虛心翛然乎塵埃之表君子取之靜以養心也涓涓乎巖竇泠泠乎澗溪逶迤浩溔以達乎江海混混其流不舍晝夜君子取之動以觀德焉擬靜於竹擬動於泉則陰陽闔闢之機盈虛消息之理亦可因是而推之矣端居暇日屏逺紛拏絃琴而鼓南薰之操濯纓而續孺子之歌沄沄者與目謀蕭蕭者與耳謀白雲在天明月當户於斯時也靈臺曠然沖襟灑然形色聲臭無一毫之芥蒂飄飄乎如遊乎物之外而不知此身之在人世間也此其自得之妙善慶有之而難以語人余樂之而徒能言言之而不能有安得載扁舟於暨陽攬芙蓉於申浦抱琴攜鶴而訪所謂竹泉者相與列席傾壺擊鮮持螯倚琅玕而臨清泚詠三髙而歌太平蓋有其日耳諸公之賦豈無啓其端者故併序之以為張本云夢吟堂詩序昔謝靈運愛其從弟惠連每對之輒得佳句嘗於永嘉登池樓吟詠未就忽夢惠連即得池塘生春草之句欣然曰此語有神助後世士大夫重兄弟之義盡友愛之情者以此自况永嘉謝氏故宋閥閲之家自晉以來歷年逺莫詳其傳次論其世德要之必自康樂也元湖廣儒學提舉景歆慕先世之流風餘韻嘗自號曰夢堂其子溫州直學榮父紹其遺芳復號吟堂吟堂之子時中又合二者之名名其堂曰夢吟時中環之父環字庭循今居京師仍以夢吟揭於寓舍蓋昭先德永孝思也徵詩於諸公乃謁余序古之稱孝子慈孫者能不泯其先親之德善至於善繼善述尤所謂達孝者也若提舉直學之景行於先時中庭循之仰止於後則謝氏文獻有足徵矣茍祖啓之而孫不繼父作之而子不述世德之不絶者幾希亦何待五世而後已哉惟祖父子孫埀休襲慶禪續綿延之無已故雖永世而不忘焉且世之言夢者由因想因想者即周官所謂思夢也昔人謂世未有夢乘車入鼠穴搗虀臼者蓋無是事則無是夢已若康樂之於惠連愛之至故思之深思之深則欲其見之切是以吟詠之頃形諸夢寐而佳句之得亦不自知其所以然矣世之昧天顯而虧彛倫者一涉利害往往視手足如塗人紾臂鬩墻之不暇尚何夢吟之有焉然則謝氏之孝友其來逺哉庭循於斯非徒尚其名而已誦分離别西川與夫海嶠西陵之詩則康樂傾想之懷參軍綢繆之意自見於言表推而達之宗族兄弟之情厚矣豈直付之空言乎哉庭循溫粹而才賢行將顯融芝蘭玉樹寧終老於階庭之間耶諸公之賦珠玉粲然溢於辭翰而黃鍾大吕之音固將洗夫凡陋矣僕衰老不足以與此姑為之序云北上倡和詩序洪熙元年春三月儼以衰疾休致而歸既閲月伏承宫車晏駕遂奔訃北行時江西按察僉事雲間黃翰汝申考績天官於是同舟而往汝申念余力疾逺道調護極至朝夕殷勤過於尋常師友之禮余甚賴之然感痛無聊之懷當髙秋搖落之際江山景物觸目驚心舟中無事輒有鄙述汝申從而和之清詞秀句實多起余者顧余之寂寥衰颯誠有愧於珠玉之璀璨汝申不以余之虛薄見棄而反以得與同舟為喜故凡有作登之簡編命曰北上倡和詩且俾余序之嗟乎然明之遇叔向執手於收器之間伍椒之逢聲子傾蓋於班荆之地古人邂逅一言契合尚能輸寫况余於汝申父子宿昔相親豈徒邂逅之情也哉總詩若千篇序以為之引非敢傳示於人聊以篤斯文之好耳城南别墅雜詠詩序洪熙元年春二月儼以老疾拜休致之命三月辭歸踰月而抵家又踰月伏承獻陵賔天遂復北上心期同軌之會至則宫車發引矣乃匍匐詣天壽謁二陵竣事告還時天子新踐祚閔念舊臣埀眷勞之恩錫道里之費既歸獲營護先隴畢子平之願而城市囂塵故人寥落不可以居於是監察御史毗陵許公勝為余物色得廢官舍於城南灌城鄉懸榻里去家十里而近許公偕御史包公德懷夏公能告余為别墅也余與諸公初至其處頽垣敗壁墜桷摧簷翳于埃墨蟲絲荒苔蔓草之間蛜蝛走庭野鼠竄瓦內外空洞四顧蕭然諸公安余曰無廢不興幸其幽逸余曰愚公尚欲移山况此猶有堂構豈不可新乎又安知他日不有高陽之名乎昔人云君子居之何陋之有乃相視一笑而退明日余出所賜命子弟鳩工購材因陋就簡葺而新之疏池築圃買松移竹而植焉野人聞而採藥於西山鄰翁過而分菊於南野日就月將生意油然佳木隂翳野芳幽香時雨新霽柔荑藹緑明月當户清風颯然琴樽在席簡編卷舒子孫日侍賓客時來足以怡神情而悅情話養衰疾而延頽齡雖無緑野􅜁川之臺館香山嵩少之林泉子文後堂之絲竹然亦非栗里之荒涼玉川之索漠庶幾可以優遊而卒歲也嗟呼謝太保風流文雅嘗欲角巾而返東山尋薔薇之舊遊卒齎志而不遂李贊皇經綸豪爽然溺志於平泉樹石遺戒子孫惓惓而不置卒貽君子玩物之譏儼以不肖荷蒙列聖之恩遇得終老於家為幸多矣涼暑風曝冬日玉堂天上惟有抱孫擊壤詠歌聖化於無窮也因閲舊篋得謝環所為畫圖遂命為城南别墅而序其所以凡有鄙述書於左方云梅花百詠詩序刑部主事前江西參政浦城潘賜文錫以其梅花百詠詩寓書于布政使孟公求余序之文錫永樂初余讀卷時進士也其學富其才敏其施於政治亦有猷有為也當朝廷清明六官政簡而文錫乃於政事之餘優遊暇日發其所藴見於詩章吟詠其性情舒寫其懷抱其用心勤矣余少宦遊吳中見故元馮海粟及釋中峯嘗有是作彼此相誇海粟卒為中峯所屈已不直於君子也朋遊盍簪傳誦以資談論而所謂百詠者遂行於世矣今觀文錫所作雖不拘拘於體物而諷詠之間其心志亦未嘗不在乎梅也好之而不忘詠之而無已是必有可好可詠者矣雖然昔人之於梅好而詠之者不少矣何遜之詩宋廣平之賦杜甫林逋之作皆見稱於世而近代論詠梅者獨以逋詩為工虞邵菴則曰以少陵安得健步移逺梅亂插繁花向晴昊之句視疏影暗香昏月淺水之語為何如其氣象固有徑庭矣學者知此乃可與言詩也余知文錫之百詠特寄興焉耳至於發揮事業涵泳膏澤美教化移風俗達乎公平廣大以鳴乎國家之盛於無窮豈止於詠物而已哉昔左太沖三都賦成有賴於皇甫士安之序余休致山林日就衰朽勉強執筆言實無文抱士安之疾孤文錫之意祇自懷慚曷以增重姑述所聞以為序云包氏説文解字補義序進賢包希魯先生博學君子也當元之季嘗著説文解字補義藏於家今其孫彥孝刋梓以行謁余序其端先生之為此書謂文字該乎天地間事物而理寓乎其中人能因文字以明理由理以循道循道以成德行德行成而施諸事業則人生以遂人極以立後漢許叔重為説文解字之書以及唐宋諸公其説雖多或猶未允遂從而申其義凡係諸人心世道之大者則加詳焉此其著述之本旨也余嘗考六書之學自周官保氏掌教國子其來尚矣漢法試學童能諷書九千字以上乃得為史然蒼頡多古字俗師失其讀宣帝命諸儒修蒼頡之法終不能復故逮元始中徵天下通小學者以百數各令記字於庭中揚雄取其有用者作訓纂篇順續蒼頡凡八十九章班固復續揚雄作十三章而六藝羣書所載略備矣至許叔重又以五經傳説臧否不同乃作五經異義及説文解字十四篇上之而𨽻書行之已久加以行草八分紛然間出六籍舊文相承傳寫多求便俗漸失本原唐大厯中李陽氷復刋定説文修正筆法頗排斥許氏自為臆説然其篆迹殊絶學者宗之至南唐徐鍇以許氏學廢又作通釋四十篇韻譜十卷當時言小學者惟鍇名家宋元以來繼有作者雖詳略不同而考訂得失未為無補近時通其學者臨江吳均仲平閩人陳登思孝而登為優二人已沒知六書者蓋鮮矣余在京師時嘗語仲平曰字書之學雖曰小學然通知古今該貫物理亦豈易言哉茍有所述俾三蒼之學復續而不絶顧不美歟仲平既往忽覩此編訓注之義簡明切當誠有禆於許氏所謂開物成務嘉惠後學者亦豈小補哉故為之序賜老堂詩序僉都御史吳興凌晏如尊公前鄭州知州彥能當洪熙改元推恩封吏科都給事中宣德丁未加封右僉都御史公之致仕而歸也名其堂曰賜老朝之公卿大夫既榮公父子之遭逢復歌詠其盛美者富矣公乃謂晏如曰豫章胡先生忝有斯文之雅汝曷不為我求一言以為斯堂之光乎晏如於是因監察御史尹子聲按治西江寓書來請余亦衰老賜歸之人也養痾山林辱公以故舊不鄙千里見存雖非空谷足音之比然亦不能無同道同志之喜也徒以江山悠逺暮景侵尋坐茂樹濯清風臨方塘對明月悵然有懷安得如香山洛社與公周旋於其間耶昔在翰林見晏如清修玉立溫淳而有文喜公之有子也今聞賜老之堂為郡邑之表逺邇歆豔則又喜晏如之能顯親也大凡人生不以富貴為足而以有子為足孰不有子而賢者為難仕宦而建功立業矣然不以馳車馬耀聲勢為榮而以歸故鄉為榮此陳秦公韓康公父子所以卓然傑出於前代冠冕當時留芳後世者也余今乃於賜老堂見之噫若斯堂可謂三善具矣一則朝廷優老能以禮一則彥能於子能教一則晏如於親能孝也余雖不獲登斯堂請以是為詩之序若其履歷恩榮則有少傅楊公之記在記萬山草堂記天下之山原於西北表於中原而蜿蜒盤礴之勢尤雄於蜀故天下言山之嶵嵬巉巖崝嵤嶮巇者必曰蜀焉有若岷嶓蔡蒙大方玉壘赤甲白鹽武都雪嶺西傾三峨之屬乃其翹然而壯觀者至於邃峽崩崖幽豅巨谼長陵峻坂有不知其幾千萬計亦不計其幾千萬名也古之騷人墨客放臣羈旅其詠歌慷慨之情悽苦其間者豈其心哉蓋觸於景者異則感於心者深感於心者深則其所發無非幽憂抑鬱之思而已若杜甫元稹劉晏賈島黃庭堅之徒豈能留一日之歡哉此數子非無一日之歡於蜀也奈何去國懷鄉之思自不能如在中州者耳華亭胡鼎文始由饒之别駕遷晉府録事由録事倅安州其在安州也所處與前數子同所樂則異焉山川之險阻道路之幽絶往來其間不能不同然值朝廷更化之日遐邇一德鼎文用能撫循其俗民以樂生凡虎嘯熊啼猿號鳺鳴當風日晦明之景撫事興懷載之歌詠怡然自得此其樂有不得與前數子盡同焉今歸十有餘年蜀之山川景物常形夢寐間乃作草堂於佘山之下為終老之計名曰萬山示不忘蜀也夫佘之山培塿􅀈屼其髙不能踰丘陵堂之命名蓋不繫於佘也不繫於佘而繫於蜀髙情逺致遊於物之外矣遊於物之外其樂豈有窮乎聽雪齋記孫子讀書於淞泖之陽顔其齋曰聽雪客或過而咍之曰君子所其無逸必有髙明之居燕息之針以警戒其怠惰荒寧之志故几杖盤盂户牖觴豆皆著之銘今子之齋何取於雪雪非恆有又何觀德焉孫子曰噫窮於化者不局於物達於道者不泥於迹子何求其鑿鑿者哉疇昔之夜玄陰四積太空冥冥振以長風萬竅響畣既而蕭蕭颼颼如木葉之初脫也飄飄􅠞􅠞如驚沙之載揚也夤緣瑟縮瀰漫淅瀝如郭索之行暫息春蠶之嚙未休也吾方掩殘編據木榻危坐而聽之乃知其為雪之作也大凡聲之在天地間其始也無形而生於有形其終也有聽而歸於無聽蓋有形者無形之著無聽者有聽之兆以有形求有聽則固而陋以無形求無聽則僻而野吾以無形者應於有形無聽者接於有聽則天下之理在我其不窮哉雪於斯際均聲也人於雪均聽也膠膠擾擾者既不得所聽荒閴寂寞之流又不知其所以聽茍聽之或取其聲之清以悅其耳未必能研幾主靜以存夫不息之功也吾於聽雪得靜之理以名吾齋奚為不可雪之來以候吾用規其時焉其積也以坎吾用師其謙焉其隨物而賦形也吾用擬其圓方焉其光輝而不緇也吾用致夫日新焉以是觀德孰曰不宜此吾雖不能几杖盤盂户牖觴豆之銘總之不離其道奚必求其鑿鑿者乎茍求其鑿鑿則雪且不能我有豈暇計其恆存乎哉客嗒然而去孫子以告因記其説俾書之齋壁約齋記翰林庶吉士蕭山俞廷輔以約名齋蓋取聖人之言以為操修之要余喜其學為已乃為之記曰凡人之有失者莫非所為之過也事親狎愛而忘敬事君怙寵而忘忠夫婦嬿昵而無别朋友凌傲以相髙長忽其少幼不遜弟與夫居室之華麗輿服之侈靡食飲之奢縱逸樂之無度凡日用事物之間口鼻耳目四肢之欲侈然以自肆者孰不為過哉過則失矣是以聖人之教抑過以就中君子務焉嘗觀天地之化四時之序陰陽推遷氣機闔闢過者必約約則收斂收斂則發生萬物始終之道於是乎備矣君子於斯觀物理盛衰之際察盈虛消息之機反身而誠樂莫大焉必也約乎中而精神心術為之操存約乎外而形骸筋骨為之檢束約乎言而榮辱樞機不敢易也約乎行而擇善固執不敢輕也以至一物之微一事之細吾皆有以約之夫豈有失也哉廷輔自幼間父師之訓操持其身心者有素矣行將顯融推以及物余知其必有濟焉大抵性靜者和平和平者寡欲志驕者放肆放肆者任情能寡欲非惟已得所養亦且於物無傷茍任情非特有損於物亦將不利於已也廷輔守聖人之言終身行之則所以成已成物者余深有望焉若夫是齋靜幽山水清美足以軼紛華而暢神情者廷輔必有自得於其中余莫得而言也乃所望願相與朂諸上清宫北真觀記上清嗣教真人四十四代天師張公宇清作北真觀既成具本末告于儼曰上清正一萬壽宫所宅者龍虎山也宫之後有象山象山之支為臺山臺山之陽為後源峰巒秀拔巖谷深窅相傳有古仙人嘗醮星於此後即其地為北真觀歷年久觀廢而故址存永樂十一年秋至北京得北斗像於崇真宫極精妙蓋宋畫苑良工筆也遂持歸以明年三月某日乃於其地擇勝復營觀宇祀北斗為閣髙若干尺奉祖師為祠廣若干楹東西周以廊廡以奠雷嶽諸神至於息遊之所有丹室有藥圃又其東有雲塢其西有林泉南則有鴣峯北則有松壑煙霞明滅嵐光吐吞喬林陰森微風逺響四時之景不窮子為我記之余嘗讀太史公天官書北斗天之璣衡也分陰陽以建四時移節度以定諸紀天地萬物無所不統故曰天之有北斗猶人君之有尚書其所繫豈細故哉真人際遇聖明眷顧深至寵錫駢蕃恩禮之厚莫加焉故居山林之間未嘗一日忘報上之心登斯閣也對神明之如在望九重於天上思所以報者惟有祝吾君盛大光明之福萬億年之壽而聖子神孫永保民於無窮然則斯觀之作也豈徒然也哉至其山水之美足以棲神保真而登覽吟詠寄髙情於物外真人必有自得之者余不復道初觀之經營道録左演法鄧景韶實贊襄之今主其觀者道士張原芳也弋陽縣重修儒學記弋陽縣儒學舊為南山書院宋季疊山先生謝君直所建後罹兵燹書院遷於弋陽國朝洪武初詔天下郡縣皆立學以造士書院遂改為今學也永樂丙申山水驟發溪流漲衍學宫漂潰故址獨存師生講肄春秋祀事居處禮儀一切遷就而已宣德丙午會稽王尚㻞宰斯邑釋菜之日顧瞻徘徊惕然於中固已默有經營之志矣期月之間政修令行民用化孚乃度材埏埴鳩工庀事自禮殿門廡以至講堂齋舍謹飾規制作之新之加丹堊於圬鏝飾金碧於棟宇髙明靖深培增於昔於是聖賢有像采章炳煥德容儼然講習有所周旋進退禮文秩然藏書有室而簡册崇景賢有祠而先德著與夫豆籩簠簋之潔修庖厨庫庾之完具卓然壯觀於溪山之域而邑之士庶得有所瞻仰而依歸矣是役也從容不迫工有程而民不擾越二載而告成教諭李陽訓導楊清吳智寓書於新建教諭王來介其徒丁習方惟矩具本末謁余記之且以表王尹之有功於學也語曰百工居肆以成其事君子學以致其道學宫之修復固有司之善政學者從事於斯豈徒尚夫宫室之美觀也哉藏焉修焉一志慮之專以戒夫遊惰之失胥告胥訓味聖賢之言以求夫義理之奧磨礲切磋深造自得乃有以開明其心志而義精仁熟則於應事接物之際皆得其宜矣施於有政特舉此而措之耳此明體適用之學諸君子篤志不倦必獲其效獲其效庶上不負朝廷教育之深恩下不孤王尹作興之美意而師友道義之相承足以紹疉山之風軌他日賔興于于然而來弋陽之士必有可觀者矣余雖衰老尚拭目焉若夫相其事而贊其成者縣丞杜琰曾觀主簿胡智典史任智皆可書也饒州府重修府治記饒自吳芮為番陽令號番君則饒故番陽縣也兩漢皆屬豫章郡建安十五年吳孫權析置番陽郡梁置吳州至隋始改饒州歷唐五代宋元以至於今所𨽻雖不一而饒之為郡則如故也吳置郡時仍治番君故城郡志則曰舊府治在城西南桃源山麓世傳晉郭景純所遷元季之亂吳宏據之為行省今為千户所矣今之府治故安國寺也國朝洪武二年郡守胡乾祐即其故址而營建焉距今六十餘年亦嘗更徙而旋復故堂宇廨舍寖入敝壞為政者習於因循莫克修治宣德庚戌春知府黃公通理偕同知馮郁來蒞是邦慨然有志新之閲歲政修事舉民安其治而通判李儀諸忠林祖推官唐定相繼而至於是合謀而作之積材庀事輦石陶甓工獻其能民效其力經營締構易故就新光華增於昔而人不知其勞正堂五間髙二丈六尺有竒深倍之廣加於深者六之一後堂三間髙一丈八尺深殺於正堂者五之一廣視正堂不及者七之三堂之南面儀門五間堂之前東西曹舍十間堂之左右經歷司照磨所各為廳三間戒石有亭豐衍有庫麗譙有樓巍然煥然傑立於郡邑之中撫綏乎斯民臨御乎屬邑不待威驅勢迫而郡人得於瞻仰者莫不於此起敬焉是役也始於辛亥八月落成於明年四月相其事者經歷欒中信知事饒豸照磨郅禮司其會計董其役者府史王悅也功既告成郡之僚寀又相與謀曰茍得文字以紀成績則黃公先事之勤得以表章且俾後之來者相承而勿墜也謂郁於余宿昔相親遂遣邑生吳偉奉書來告饒江右名郡也自昔文物之盛彬彬焉論勳業忠義則有陶桓公父子論節行文章則有洪忠宣父子論為相不茍則有趙忠定及江馬二公論道學相承則有雙峰饒氏較之他郡未能或之先也郡治之新豈獨為郡之人瞻仰也哉為政者於斯宣其教化則禮義廉恥之風興明其政刑則頑獷暴戾之徒戢導其生養則仰事俯育之情遂詩云赫赫師尹民具爾瞻又曰豈弟君子民之父母其斯之謂歟有若唐之顔魯公宋之范文正公元之韓伯髙潘敏中國初之陶主敬皆嘗治饒澤被斯民民到於今稱之諸君子追惟前哲論世尚友其人雖逺其流風善政猶有存者茍求其故必有合焉施於有政今之民猶昔之民將見其得於觀感形諸歌頌流聞後世而不泯滅子雖衰老嘗備史官抑將大書特書而不一書也姑記此以俟容膝軒記容膝軒者平江伯陳公燕休之室也公膺分閫之寄總漕運之師自江淮以達於北京其任大其責重言出而信孚令行而政肅舉措合理人無或違勞心焦思亦有年矣自公退食於兹軒乃欲優遊於暇日蓋有不可得者然其心謙卑巽順未嘗以貴富驕人省察克治獨能以滿盈為戒宜其收斂於中若肅然而有臨檢束於外不侈然以自放從容鈴閣有羊叔子之遺風忠順勤勞有陶桓公之經濟綜理精密有劉士安之規摹合是數者見諸行事恢恢乎其有餘裕矣而公之心不自滿假是以享爵祿於髙年著功業於明時流聲名於後世此其所以自致者豈淺淺哉一室之內左圖右史羽扇綸巾徜徉乎其間所居雖廣不踰尋丈而胸次廓然含𢎞光大誠有過於髙堂大厦者矣彼有不知者固未信公之儉約余忝侍同朝嘗見公之服御猶儒素寵遇無矜耀接人以敬恭固已重公之雅度矣及休致南歸舟次淮浦勞公枉顧餞送殷勤不以不肖屬為軒記别來八載養痾山林才思荒落無以塞責侍郎趙公復致公命感傾蓋之結言負當時之宿諾引領託懷乃所願於公者名軒之意始終無替而已敬書此以復公公有取耶其無取也廣州府儒學重修雲章閣記廣州府儒學重修雲章閣既成監察御史五河丁公寧合藩臬諸公走書幣來徵記且曰閣成之日適朝廷命下武臣子弟皆得受業學官兼資文武誠千載之盛事一時之嘉會茍得記之則嶺南之士得於觀感者益勵厥志而於治化實有禆焉按是閣初曰尊經􅍥置簡册在畨山之下講堂之北故元泰定丁卯憲使吕禎更曰雲章取詩之義蓋雲漢昭回天之文也法言大訓聖賢之文也舊曰尊經者天下之所同然經無待於尊也至於雲章則廣獨昭揭乎斯名深有以起發乎學者之心志歷歲既久風雨震陵螙蝕侵剝摧敗傾圮孑然莫支宣德壬子丁公巡按是邦祇謁廟庭會講之餘目擊心存慨然與諸公僉謀新之於是各捐資俸鳩工取材輦石陶甓易其腐敗加以彩鏝興作於夏訖秋告成髙六仭有竒廣倍之深五尋為楹者七焉規摹𢎞敞棟宇巍峨締構堅緻丹碧焜煌逺近瞻仰誠為壯觀褒衣儒冠登斯閣也海日初旦天光發新抑思有以洗瀹澡雪日新其德者乎超然逺覽出乎塵氛抑思有以脫略凡近而遊髙明者乎若然則斯閣非直為觀美乃所以為吾成德之地也而部使暨方鎮諸公作新之意所以期待於諸君子者其亦在兹乎將見教修於户庭化行於嶺海其所及者逺矣昔者張公九齡余公安道實是邦之先哲也嘉言善行確乎金石流風餘韻蓋可想見矧二公事業表表偉偉文武兼資論世尚友豈無其人耶余養痾山林衰朽之餘不能有所發揮姑記此以俟素軒記都督沐公偕其兄太傅黔國公膺閫外之寄撫綏雲南世濟其美矣乃名其燕居之室曰素軒來徵記或者曰公之所居廣厦華榱公之所服錦衣繡裳公之騶從髙牙大纛公之曰素殆所謂素富貴行乎富貴者也余曰不然余昔忝侍同朝見太傅公與公雖身都富貴而服御器物泊然儒素處已以約接人以恭事上敬謹遇下無驕若不知有富貴之在其身者也雖曰由居養之素有以異於人亦其天性之美不為侈靡之所移爾雅歌投壺祭征虜之素也輕裘緩帶羊叔子之素也乎不釋卷杜征南之素也公於斯三君子者蓋有不事矯拂而吻合者焉政修於金馬碧雞之間令行於赤水銀沙之外以他人居之正意得志滿馳騁之日公乃脫略紈綺不為表襮厭巧返朴推誠待人茍非其天性之美曷克臻兹雖然余嘗承乏太史見國家之取南詔命將出師皆承宥密之經綸敵愾奮威遂致折衝於萬里論其成功豈一朝一夕之力哉公之父子昆弟保釐兹土而逺人傾心嚮化罔敢違越於今四五十年此固國家深仁厚澤之所致然亦公伯仲恢𢎞世業統御有方恩威並布有以服其心也詩曰保佑命之自天申之夫豈偶然也哉願公永堅素志無替厥服則勳庸著於旗常福慶流於後世前所謂三君子者豈得專美於昔耶公不以余之衰老山川萬里屬為之記勉強執筆無所發揮他日論功臣之世勳者或有取焉重修新建縣儒學記新建縣儒學乃元之宗濂書院也按郡志宋淳祐間江丞相萬里典藩于洪以濂溪周子嘗尹南昌乃建祠祀之表其額曰宗濂精舍其地在望雲門外龍沙岡之上後燬於兵元立學官天下郡縣皆有學元統初邑令薛方即龍岡故址以為邑庠時省臣賈鹿泉監司劉宣因郡士萬一鶚熊朋來之請謂精舍既為邑庠而周子之祠不可湮沒乃相與出資得民間廢宅於東湖北涯復創宗濂書院元季龍岡之學復廢而東湖之書院存國朝洪武五年遂以書院為新建縣儒學於今六十餘年矣其居講席者非一人而興造修復者亦屢矣然更歲月風雨震陵而殿堂門廡齋舍祠宇不能不腐撓敗剝有志於斯者存乎其人焉宣德七年春三衢江玠來為教諭慨然有志新之玠丞相公之族孫也即以其事請於當道時吏部侍郎富春趙公巡撫西江監察御史安嶽王公亦按治於兹合藩臬諸公及郡邑長吏詢謀僉同即其故而更以新於是自禮殿達於門廡自講堂及於齋舍若藏修之室若江公之祠鳩工飭材加甓鏝堊丹碧照耀輪奐增美巍然傑出於湖光天影之間猗歟偉哉工始於八年春二月再閲月而告成可謂役不煩而民不勞也董其事者主簿桂陽袁景春朝夕在頖克勤所事既落成景春與玠謁余記之竊惟是邦濂溪先生過化之所丞相江公所以祀先生者豈徒然哉誠欲學者知所依歸而光風霽月髙山景行千載猶一日也故學舍雖有遷易而道則無古今求其道者圖書具在圖衍太極書體夫誠而天地萬物之理無所不該推之於用則修齊治平自身而家而國而天下亦舉而措之耳學者果能於先生遺書講求而盡心焉則日進於髙明不流於汚下日歸於中正不惑於邪説而凡馳騖於文藻役志於功利者皆非先生之學也吾黨之士幸相與朂之是為記詩禮庭記宣聖五十九代孫襲封衍聖公彥縉日遊家庭常懷祖訓乃揭詩禮二字於門屏之間出入觀省如聞聖謨將以措之躬行見諸實用可謂善學者矣來朝京師徵記於儼儼聞遊於聖人之門者難為言况於聖人之子孫乎無已勉述其所聞而應命焉子所雅言詩書執禮天下古今之所共知而共學者也至於教子亦曰詩禮而已詞氣從容恩義篤至此陳亢所以喜幸而世之為父子者於是而有法式焉凡人之修身莫先於得其性情之正躬行莫安於循乎規矩之常詩三百篇不越乎六義六義之詞有善有惡或勸或懲而諷詠之間優柔浸漬善心由是而感發逸志因之以懲創得於其心發於其言言滿天下必無口過此性情之得其正者也故曰不學詩無以言經禮三百曲禮三千皆天典民彛之實精神心術之所寓爾戒謹恐懼履之而不違造次顛沛守之而不失約以持已推以接物行滿天下必無怨惡此規矩之能循其常者也故曰不學禮無以立由是而之焉孝於親忠於君和於族以達於人人無非詩禮之發用也雖然詩之篇雖多一言以蔽之曰思無邪禮之義雖廣亦可以一言蔽之曰毋不敬公其勉之雖然儼又有告焉古人有言曰若人未見聖若不克見既見聖亦不克由聖此學者之通患也為子孫者則不然聖靈洋洋日在其上趨蹌於庭周旋進退悠然若有聆乎金石之奏肅然必有聞乎其容聲可不敬乎可不勉乎儼既衰且疾言無文理公不鄙棄茍有取焉或亦可為髙明之一助云是為記禮齋記大凡士君子之行施諸人而不悖傳諸後而無斁者必有其道也亦曰禮而已禮者參天地之化貫古今而不息自身而教子孫自家而治天下舉不外此道焉干越劉均立氏溫厚謙謹尚禮之君子也嘗以禮仕於四方而人化之矣及既歿其子則庸能嗣厥志循循雅飭操修繼述於其宗族於其鄉人一以禮為之本於是名其所居之室曰禮齋非有得於過庭之訓者能之乎大家世族非無勢利紛華以遺其子孫往往豢養之氣盈紈綺之習勝至有以驕奢覆其宗淫佚僨其家者其故何哉不知以禮為之防耳仲尼立教必事約禮其雅言必曰執禮其命伯魚必敕以學禮禮之於人不既重矣乎今夫視不思明而眩於惡色聽不思聰而亂於惡聲言不思道而妄發行不思敬而妄動是為棄禮之人棄禮之人必至於滅天理窮人欲其不流於禽獸者幾希故粗而灑掃應對始於童幼之習精而道德性命終於聖人之歸無不有禮焉則庸於此盍因其所已能勉其所未至者蓋堯舜三代之遺説天子諸侯大夫士之成制與夫吉凶軍賓嘉之儀文具載之書遭秦滅學雖其間不能無傅會參錯之説要之其文富其義廣隨其所得博而約之庶幾先王之遺意或可因有以考見焉斯為善學者矣均立既能以禮導之於前可謂得其道者則庸復能以禮繼之於後可謂守其道者禮文之懿光輝乎父子之間此固君子喜聞而樂道之也因則庸之請故不辭而記之俾其得於覽觀之間亦思所以施諸人而傳諸後矣其富貴福澤豈有窮乎永嘉大羅山黃公壽藏記少保戶部尚書武英殿大學士永嘉黃公以其子貴推恩受封壽考尊崇髙出當世天下榮之此其獲於天者非偶然也嘗擬其歸藏之兆於大羅山祖塋之側卜吉之日甘露降於松柏休徵之至此又不期然而然者矣好生惡死人之常情故凡言死者人多諱之况預為墓兆者乎人生宇內不過百年七十者稀况九十者乎九十者難而位極人臣此尤不其難乎夫死生猶夜旦爾不惑於死生而原始要終預立於事非智者不能五福以壽為先既壽且貴非仁者不獲天之於人豈屑屑然哉然作善降祥惠迪而吉天固有不能違乎人者黃氏世德至公父子食其報其所以然者人莫知之雖黃氏亦莫知之而天固知之矣詩云瑟彼玉瓚黃流在中豈弟君子福祿攸降休徵之符豈虛也哉昔桓司馬作石槨三年不成君子謂其不情楊王孫不事衣棺而從裸葬亦非人情也惟杜征南見邢山之墓而有取於祭仲謂其制得中焉公之壽藏必遵法制非茍作者山髙水清豐草茂林鬱鬱佳城過者必欽儼忝交公之子少保淮又嘗同禁侍數以記請辭不獲歸次通州復以書促之曰必得子文朝正使還俾歸刻石得慰老親之心於是不以衰陋遂執筆記之公字思恭别號靜庵夫人某氏壽藏之作永樂庚寅冬十月草有六日也守一齋記左通政鄆城樊公名敬字守一乃以其字題其齋居出入觀省顧名思義檢身修行求協於克一而得有所守屬余記之以廣其義余謂精一執中者堯舜禹授受之心法聖聖相傳千萬世守此而天下治孔子不得其位明此道以淑諸人千萬世學者由此而得所宗此公之素所聞素所學者余何言哉雖然天開於子而終於亥自時日月歲積而為世為運為會皆統乎一元之數也乾闢坤闔五行布四時行而百物生形形色色者皆本乎一元之運也君子法天之經因地之義原其始而要其終知萬化之一原也萬事之一理也萬殊之一本也故於日用事物之間操存省察擇善而固執守約而施博反身而誠樂莫大焉故曰德惟一動罔不吉然必精粹而無一毫私欲之雜始終而無一息懈惰之間則所守者篤而不為事物之所侵奪矣於此茍非敬以將之所謂涵養其本原者又烏能必其主一而無適也哉若夫鄉鄰鬬而不知閉户同室鬬而不知救此執一者舉一而廢百君子不由也請以是為齋之記養恬齋記中書舍人王仲序取莊周氏之言名其齋曰養恬謁余為記昔周當戰國之時大朴既散巧偽日滋遊談之士縱橫捭闔馳騁辨難於諸侯而天下之俗日趨於知術囂囂然以詐力相髙而先王仁義之教泯焉不絶如線矣周於其間欲矯其俗謂古之治道者以恬養知生而無以知為也以知養恬其大概欲反其性而已以周之淡泊寧靜視彼之紛紜馳騖者其迹固髙矣然於聖賢之道未免半塗而廢似是而非也恬之為言安也周之意謂雖知周萬物而恬淡自適止乎安而已聖賢大學之教知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得以之修身則身修以之齊家則家齊以之治國平天下則國治而天下平豈若周之養恬而已哉仲序職司乎文翰日居乎承明簮纓佩玉從容於法從之間所謂養恬者亦惟安其職業無所願乎其外耳蓋取其名不取其義也雖然富貴不淫貧賤不移威武不屈是皆安於所遇非善養者不能仲序以英年邁往之資養之有素所以揭德振華者將為邦家之光豈效栖栖者屛知黜聰為虛無之守也哉余於仲序以鄉人一日之長既為之記并以寓逺大高明之望焉樂靜齋記永嘉謝環庭循以江左名族自十一世祖某乃徙居渥洋至曾大父某仕元為湖廣儒學提舉大父某石門書院山長考某隱居弗仕皆樂渥洋山水幽勝居則養性讀書出則以道淑人而庭循景仰先德好學而有文清修玉立迥出流俗嘗於所居名其藏修之室曰樂靜其所資者深矣永樂之初以藝事薦入京今扈從寓北京之昭回坊仍以樂靜署其齋居來徵記人之志各有所樂流水遊龍綺紈富麗貴豪者所樂也靡曼妖冶絲竹謳吟宴遊者所樂也耕鑿作息仰事俯育農夫之所樂也長林絶澗考槃詠歌幽人之所樂也樵之樂山林漁之樂江湖市肆賈區則百工負販之徒之所樂也君子之樂蓋亦有之逺塵囂之紛紏安素履之間暇貽雅志於典墳寄髙情於千古故曰聖人定之以中正仁義而主靜其靜也必有所事其樂也豈徒枯稿尸默而已哉庭循居京師之都會日與髙人賢士交接於其間方將延聲譽於四方致功業於逺大雖欲靜且不可顧可溺志於樂乎雖然此於其迹不於其心也茍其心不為物纍無往而不靜亦無往而不樂也奚必髙蹈逺引絶類離倫而後為靜耳無所聞目無所見而後為樂哉彼憧憧往來於膠膠擾擾者固不足以語此余亦靜者人或以為簡亦各從其志耳庭循之志適與余合故為之記且以自警云光霽堂記吉水周子勉今翰林侍讀崇述之叔父故家桑園舊有堂曰光霽元季燬於兵其諸父嘗有志於斯而未就今卒成於子勉子勉發資蓄率族人於故址作堂若干楹深廣若干尺雖無雕刻藻繪之飾而髙明閎壯則加於昔矣每歲時祀事徹餕燕饗必聚族於斯而父兄子弟歡欣怡愈於一堂之上非特可以表一家之休慶而和樂之風亦足以儀刑於鄉人矣堂之名故有詹孟舉書而記則今以屬余昔宗家濂溪先生元公以髙明之資發精微之藴而千萬世道統之傳實有賴焉故其胸次悠然真與天地同流而當世賢士大夫獲見顔色或承緒論莫不灑然如挹光風朗然如臨霽月脫略窘束超然物表誠有如黃太史之所言者然自程夫子吟風弄月而歸有吾與點也之意繼之者未有聞焉今子勉歆先賢之髙義擴先世之遺搆揭華扁於新堂可謂善於繼述者固將景行行止豈徒尚其名而已哉雖然居敬窮理為入德之門孝弟忠信乃踐形之實居安資深反身而誠充實之至光輝發焉若夫樂於求志而尚友千古雅意林壑而歌詠先王之道此濂溪夫子之所以髙出百世而光霽斯文者又在君子之自得者何如耳子勉父兄子弟之間凡數十百人若崇述孟簡崇厚皆為聞人余故樂為之記抑以余言為然否乎集虛庵記集虛庵者道士許全義修真之所也庵在干越之玄明觀其曰集虛者取莊周假託之辭唯道集虛之義也以余昔教其邑乃來徵記余進而問焉虛之為言空也道何由寓既虛矣庵何以居且方外之士黜聰明去健羡外形骸又焉事余文全義對曰吾嘗觀諸水矣虛則流實則滯觀諸火矣虛則明實則暗觀諸室中虛則通實則窒物皆然心為甚初吾之未入道也驅馳乎俗務奔走乎塵勞膠膠擾擾困於物者屢矣曽不與之化者幾希幸而去此託迹方外翛然獨處乎是庵以修吾道審一氣之存固天地之根滌除玄覽八荒洞達恬淡希夷虛空生白固知真道實集乎虛也此吾南華老仙蓋將以其虛而虛天下之實豈徒為是荒唐之言無端崖之辭也哉然亦述仲尼所以告顔子者心齋之要不外是矣昔吾得於師者如此願有以教之余告之曰子之言子之道也周之書周之言也必曰吾道率性者是已反身而誠樂莫大焉子雖遊乎方之外歸而求之必有得於性分之內者亦非余之所能強也雖然彼有徇於外者日奉其教應酬鄉井閭閻之間往來屑屑終身而不悟者視全義大有徑庭矣余舊與其師徒遊觀其居山林之幽蕭散間曠皆能攻苦食淡勤於其業以興廢舉墜有可尚者故為之記味菜軒記從子曦今年春來省侍間語及故廬對曰新築室室之後開小軒為修息之所未有名敢請適福建參政熊本誠遺菜圖遂以味菜名且為記以朂之在禮曰六十宿肉又曰六十非肉不飽而孟子亦曰七十者食肉古者制民有恆産故飲食衣服宫室器用皆有恆制茍年未六十者不肉食雖食肉亦不恆也七月之詩食鬱及薁亨葵及菽食瓜斷壺此民之恆食也至於獻羔殺羔祭與奉上焉已爾自周衰戰國縱橫敗先王之制逮秦阡陌開而地利盡井田廢而恆産亡民無恆産則無恆心故放僻邪侈無不為矣放僻邪侈由不知約也約則儉儉德之共也反儉則侈侈惡之大也君子非淡泊無以寧志吾家世儒素吾父遭元季喪亂由金川徙南昌辛勤立業遺子孫以忠孝勤儉子孫當世守也吾承祖宗遺澤德薄能鮮叨沐聖恩有位於朝自筮仕至於今三十有四年矣未嘗一日敢忘先人之訓也又嘗見鄉里故家未有不由祖宗勤儉積德而興至其子孫亦未有不以奢侈驕惰而喪今之名軒亦惟子孫本忠孝務勤儉守先訓而已昔汪信民嘗言人常咬得菜根則百事可做文定公聞之擊節歎賞曦尚念之哉瞻衮堂記君子居江湖之逺則思其君處廟堂之上則思其民此固忠愛之心不能自己然亦職分之當然也前太常丞贈少卿袁公廷玉嘗以唐舉吕公之術受知於上遭遇寵榮人鮮能及既老得致事乃名所居之堂曰瞻衮其志蓋可見矣夫衮龍衣也衮冕九章以龍為首天子享郊廟臨明堂朝會諸侯之法服也昔者廷玉之在朝廷從容簮紱班鵷鷺之行覲天顔於咫尺親道德之光華則繪畫絺繡煥乎天章無日不接乎目而亦無待於瞻也及其退休於家優遊暇日望蓬萊之五色想翠華於天上雖跬步必懷乎恩眷雖一飰不忘乎周旋蓋其忠愛之心為無窮而筋力則不逮矣顧其力之不逮而欲寓其無窮之心此瞻衮之堂所以名焉今公辭榮而逝已十年餘而堂固在其子尚寶少卿忠徹數以記請余嘗接公緒論毅然正直皆中理道知公為儒者而公嘗以逺大相期余雖不敏寧無一言以酬知巳邪故勉為之記庶幾表公之夙志使不泯於後而忠徹不遺其親之仁於此亦可見矣重修徐髙士祠堂記水經酈元云贑水北徑南昌縣西歷白社其西有徐孺子墓又北歷南塘其東為孺子宅際湖南小洲上豫章續志云孺子亭即孺子宅也舊宅在州東北三里許凃廙古今志及寰宇記皆云在梅福宅東陳蕃為遷於塘東百步湖南際小洲上即酈元所云者自唐以來固已於其所作亭宋初王明為守更新之易為廣厦未知何時復毁及南豐曾公繼為守始即其處結茆為堂圖孺子像而祠之亦曰湖南小洲上有孺子宅號孺子臺蓋曰宅曰亭曰臺皆即其處而世易其名耳元初江西行省參政東平徐琰重作之至正末燬於兵故處沒為民居髙橋之南有孺子亭者蓋自唐有也考之郡志唐宣宗時塘東有三亭曰涵虛曰孺子曰碧波乾符中俱廢洪容齋曰碧波後為孺子祠髙橋之孺子亭余幼時嘗遊其下土阜䇄立有亭巋然祠孺子範土為像乃漢衣冠也洪武甲寅都指揮宋晟以其當行道平之太守許方遂遷祠於環波亭之故址而碧波之孺子祠亦沒於湖矣環波亭者宋淳熙中張帥子顔即涵虛廢亭所建後亦廢故髙橋之祠遷立焉祠枕湖風雨所會歲既久而祠益壞永樂癸卯秋監察御史張公庸謁祠慨然有志新之郡庠生黎彥當陳昶因勸率好事者鳩工聚材以成其志於是參政樊公敬憲副成公均各以其祿助之作祠堂三間廣二十四尺深加廣之數二尺甃其壁而繚以垣中新肖像外樹門屋規制一新丹碧煥然於湖光煙水之間五閲月而告成既成又五年而求余為之記嗚呼孺子平生志行見諸史其髙風清節重於當時稱於後世千百載無異詞誠獨行之君子哉抑嘗論之伯夷之清柳下惠之介孺子有焉若孺子者夷惠之間也君子論世尚友况居其鄉者乎故不以鄙陋記其本末使來者有徵焉梅雪軒記梅雪軒者行部主事洪璵宗器所寓之室也洪氏世居嚴之青溪東晉時曰紹者仕為門下侍郎進階金紫自是子孫纍以武事顯至宋曰嘉瑞暨子雋皆由進士歷官為聞人數傳至九齡仕為江陰州僉判僉判五傳至源洪武中由太學生教諭饒之安仁即璵之先君子也璵嘗從其先人還青溪指故廬曰此僉判所立據溪山之勝四時朝暮之景皆在几席僉判性嗜梅故左右前後皆樹梅歲寒氷雪之時粲然芬芳顧視山林草木搖落而此獨秀潔於是扁其讀書之室曰梅雪蓋擬德焉璵固識之故隨其所寓亦以梅雪名昭先德且述事也昔李贊皇以經濟之才超邁之氣為能宰相溺於玩物拳拳乎平泉樹石遺戒子孫卒不能守君子以為愚若竒章之石嗜好尤篤奔走趨附之徒不亦愚乎二人皆君子所不取何哉於德無觀焉耳至於幽人逸士之所好尚以為風月吟詠之資亦徒取其清而已洪氏之居自僉判至今已六七世矣溪山堂構不改舊觀而梅之植者益蕃教諭父子文學相承藹然蔚然其名位雖非昔人之比然砥行礪操獨可嘉也覩嘉樹於百年寄遐思於所寓而璵方將播其德馨保其清白無愧於梅雪無忝於前人豈非善繼述者乎是皆可書也余昔在干越璵之先君子在安仁聲聞實相接今喜璵以進士發身能世其家蒞官才敏有聞於時因其請也故為之記墓志碑銘熊先生墓志銘永樂元年十一月一日豫章熊先生卒於家其孫翼之走京師來徵銘嗚呼先生之歿也儼弗克弔哭尚忍銘其墓耶雖然儼辱知先生又嘗從校藝鄂渚往返同傳者踰月其平生履歷蓋嘗聞之矣且不鄙期待以斯文甚至今其已矣銘可辭乎乃敘而銘之先生諱釗字伯幾姓熊氏其先江陵人後徙南昌中葉有諱逮者南唐時贅居豐城之拏岡生延福仕李氏得顯官六傳至本復還南昌本生亨亨生開乃遷進賢之北山再傳至純有文學仕宋為儒學官知名當時辛稼軒極推重之實先生之髙祖也曾祖夢齡祖立信俱以德操表儀鄉邦考元誠篤志雙峰饒氏之學故先生自幼所得固已大過人矣既長父命從廬陵王先生充耘受書經陳先生植受春秋蕭先生彛翁受詩經元至正甲申遂以春秋領鄉薦為崇仁學官釋菜之日虞文靖公躬詣學酌酒與諸儒交慶得友又酌諸生慶得師由是聲稱翕然滿考復典教進賢適鄉邑騷然絃誦遂寢既而徐壽輝兵犯江西江東之民相煽而起先生乃與里人樊明仲合謀倡義立營柵阻大湖以守北山時江西被攻甚急固守者五十四日外援絶先生出竒兵與戰連捷其黨稍卻夜遣壯士持羽書踰城入告城中得報乃併力出擊圍遂解省臣嘉其功承制署南昌主簿自是將水陸軍守禦招輯凡七寒暑以積勞授將仕郎臨江路知事再升登仕郎江西等處儒學副提舉未幾陳友諒以兵攻省城城陷守臣出亡先生間道之臨川以策干司徒公多通營國公和尼齊皆不能用徒受命收兵故部而事無及矣友諒既得志欲招致之先生隱匿山澤中不出者數年廬陵劉仲孚聞而嘆曰倡義有為蹈義有守足以表見於世而北山遂有忠義之美名不其賢乎初丞相額琳沁巴勒將兵恢復由江東而來聲威赫然愚民罣誤賊中者多死先生潛招諭使復業百里之間全活者甚衆當統禦之際鄉邑飢人相食先生力請於省得米麥賑之民賴以生者又甚衆蘄黃富民數百艘避兵北山下鄉之豪士恐其作亂將掩取之先生令人密伺知非為亂者即白於衆事遂止嘗自誦曰吾平生無過人者世亂而造千家之命年飢而起萬竈之煙如斯而已矣入國朝先生老處丘園日與學者講論經義循循不倦及其門者皆以文學知名四十年間江右士大夫論老成碩德禮文之所取法後生之所依歸興賢校藝朝廷四方之所徵聘必之先生洪武癸酉校書會同館書成宴錫甚厚嘗與儼論學及敬齋針曰其要在動靜弗違表裏交正此二句反覆推論乃一篇之關鍵昔雙峰饒氏得之於𢎞齋李氏李氏則遡紫陽朱子以接夫濂洛之傳者也今豫章學者多宗饒氏而饒氏之學蓋自敬始釗幼承父師之訓及登虞文靖公之門得公指喻亦曰戰戰兢兢如臨深淵如履薄氷曾子終身之敬也求諸聖賢之心必考乎儒先之教凛凛乎其可忽哉嗚呼先生之源委若此其綱領旨趣可得而見矣其所著述有學庸私録論孟類編春秋啓鑰杜子美詩注及虞亭文集若干卷儼皆得而讀之宏博精切各極其底裏其卒也享年八十有三其葬也以卒之次年十二月某日祔梭渚龍馬洲先人墓側母吳夫人衣冠世族初娶葉氏繼室周氏子男四人長安石陜西平涼上郿遞運大使次實次筠俱蚤世次稷女二人長適樊榮昌次適張端夫四子二女皆周出也孫男三人長即翼之次長生次公受孫女四人實筠嘗以事赴理爭就逮竟相繼死君子謂實死於友愛筠死於篤孝雖皆出於天性然亦教所及也先生善事重闈虞公題其堂曰介福且為文以美之叔父元明死於外收葬盡禮撫其遺孤俾克成立姑氏適人貧窶存則賙給之歿則資斂之與鄉人處一以德讓逺邇化服嗚呼入則孝出則弟仕則致其力守聖賢之學淑諸人以終其身若先生者歿可祭於社矣銘曰猗與先生德懋而崇學粹而豐道積厥躬四方式宗有猷有為而卒不施休慶用貽引物連類大肆厥辭猗與先生令聞永埀故資政大夫禮部尚書鄭公神道碑銘國朝混一區宇禮樂教化唐虞三代之盛也公卿大夫由科第發身事業文章炳炳烺烺近代鮮儷若尚書鄭公之深沉敦厚恢廓有為尤進士之傑魁者今其已矣其可得哉公諱賜字彥嘉姓鄭氏世為閩之建寧人曾祖諱食邑祖諱蘭芳俱有隱德稱善士考伯仁初娶張氏久無子祖母范憂之禱於神已而公生側室陳氏出也生有異徵族里皆竒之既失所怙張夫人愛之猶已出鞠育教誨進於成立俾入郡庠充弟子員郡博士嚴教條以束諸生諸生多不能堪而公獨安之磨礲淬礪不懈益勤至不知飢渴寒暑以蓄其有下筆為文日演以肆居處有禮言動不茍雖尋常几格間圖書筆研亦秩然有序名公魁士一見皆器重之由是聲譽藹鬱出於行輩洪武甲子遂以易經領鄉薦明年擢進士拜監察御史時天下郡邑吏多以浼冒獲戾逮繫無虛日朝廷宥遣戍邊特命公於龍江編次其行伍值暑甚公召諸械者諭以主上恩意開示大信脫其械俾各僦居止息每旦一來見衆感悅如期無敢後其有疾病羸弱者日蠲祿米具饘粥湯藥以給之獅子山有道士某僧某見曰鄭御史法官也能惠施若此吾徒寧無愧乎於是相率出資設行庖為飲食諸戍徒賴以全活者甚衆以至道路往來困乏之人亦獲其濟皆歎曰此鄭公之惠也秩滿升湖廣布政司右參議始至諸曹吏多驕蹇奢縱公召立庭下訓飭而約束之吏斂手不敢為非多滿考擢用為材官於是皆感公之德公於政利有當興害有當去施罷不俟日諸洞苗獠反側不常鄰境郡縣數被侵毒公召其酋長布告恩威結以信義寬其徭賦諸酋感激拜謝誓不再為惡鄰境之民悉得安堵丁張夫人憂去官居家杜門謝賔客疏食飲水三年之間哀慕如一日服除至京轉北平布政司右參議舉措施為咸得其宜吏民胥恱今上時在藩國公服事惟謹尤被眷愛復以事相連謫置安東屯行次冀北山谷間父老數十輩拜於路曰吾儕小人仰盛德者久矣今獲一見幸甚各載食與漿相迎勞又攜鈔千貫來獻公力拒不納遂行未幾拔為工部尚書上即位轉刑部尚書賜內廄名馬踰數日以陳夫人憂懇請去位上初政圖仕舊人勉留公乃止每旦出則正衣冠視事夕入則易服就位哭奠如儀永樂三年遷禮部尚書凡朝會祭祀貢獻禮儀參酌凖式質文彬彬奏議詳雅人誦其能嘗病暑上數遣人賜藥物有詔命儒臣纂修永樂大典公實為監修官公為人有容往來交際不失其敬接士有禮御下有恩以寬廉平直聞於天下號稱名臣公為文有聞一齋集若干卷適興集若干卷又有泛鄂渚躋桂嶺經朔漠覽平城紀行諸詩皆清雅和平之製屬纊前四日公待漏直廬夢神人肩一龜遺之公盛以槃視之乃木龜也覺而語同列曰吾其不食已越三日俟朝內廷日將晡忽眩瞀不能支僚吏掖出登肩輿至部喉中有聲轟然湯藥不下咽夜二鼓嗒然而逝實永樂六年六月草四日也享年五十有八上聞之嗟悼甚命工部製棺槨遣官諭祭寵遇之隆終始如一君臣之義至矣夫人蔡氏淑而賢有子一人曰中女三人長適楊壽夫次適鄒魯璧次適李浩皆士人孫男二人長曰綱先公卒次曰某在襁褓孫女一人將以某年月日葬某處子中持狀求碑銘儼辱知公舊辭不可乃為之銘銘曰猗與鄭公為時名臣嶻嶻紫芝實降其神維稟之豐維積之隆敷施振邁有赫其逢孰不為仕公簡闕張處士墓志銘余昔寓華亭得為善之士老而彌篤者一人焉余所遊者字示卿諱文珤姓張氏後山處士其號也自余去華亭十有三年矣每與賢士大夫論善人富而好禮若處士者不多見聞余言者雖不及識處士蓋亦想見其人焉今年春友人趙友同來京師賫天台陶九成狀一通致處士之孫完之意來請銘按狀處士之先世為中州人有仕宋從南渡遂居杭七世祖某嘗遊華亭愛其山水乃結廬於干山櫻珠灣而徙家焉五世祖某又遷鳳凰山之陽曾祖通好施豫每大雪中掃地布粟以飼飢禽壽九十有三祖顯通天官陰陽之學壽八十有四考俊勤敏有才略壽七十處士器宇魁岸天資頴發每自策勵務進於善其事親也奉養無違居喪毁瘠哀慕終身其處昆弟也無間言於親戚務盡恩意其自奉也衣止布帛食無重味其教子孫也以忠孝勤儉為本其於鄉黨州閭或婚喪或患難或凶荒或疾疫或貧不能存凡以急告者悉應之無吝色晚年喜與方外之士遊羊豕鴈雞之畜非賓祭不殺或出見漁獵輒市其所獲而縱之遇杠梁圮弗治者亦完而新之以故人咸稱長者永樂元年九月十四日以微疾諸孫扶掖端坐問日支干不及他事夷然而逝享年九十配孫氏先處士十九年卒子男一麒亦先卒女一適盧祥孫男二彬完曾孫男三暐旻􅌔以是年十月二日卜兆余山之原與孫氏合葬焉葬之日逺近傾赴執紼者屬路傳曰積善之家必有餘慶以余所聞所見於張氏自其先世以來及處士之身家故多資皆以康寧而享壽考將不謂之積善之長乎若處士克全五福以昌厥後天之報施善人有由然哉其可銘也已銘曰善之積慶斯獲躬壽康後逢吉識諸幽瑑兹石故承事郎曲阜知縣孔公墓表故承事郎曲阜知縣孔希範者孔子五十六世孫也歷官十有七年以目眚致仕踰年而終享年六十有五既葬之五年其子詢寓書奉狀來徵墓文公字士則元中奉大夫襲封衍聖公國子祭酒諱克堅之子嘉議大夫襲封衍聖公纍贈通奉大夫河南江北等處行中書省參知政事護軍追封魯郡公諡文肅諱思晦之孫纍贈通議大夫禮部尚書上輕車都尉追封魯郡侯諱浣之曾孫曾祖妣李氏祖妣張氏皆追封魯郡夫人妣張氏元濟寧總管子仁之女封魯郡太夫人公天資秀穎器宇髙邁自少侍中奉讀書成均精勤博涉已為人所器重元季兵亂侍中奉歸闕里入國朝王師下中原有詔即闕里起中奉公侍行當是時朝廷褒崇先聖於中奉特加恩禮而公之兄希學仍襲封衍聖公族人復賢公欲薦知曲阜公曰先聖德澤均被後胤吾兄弟豈得專其美於是讓其從叔父克畇克畇卒又讓其從兄希文希文免而族人卒薦公遂拜世襲之命實洪武二十八年春二月也公為政直道而行於宗族於鄉人不以私廢公不以恩掩義逺邇之間小大親疏咸懷其惠邑嘗有豪強誣細民代戍邊者其人上下關節民被鉗制受誣不能自直公歎曰吾為令民枉而不理非職也乃具本末力辨於上官由是細民得直而罪其豪強其他效尤者遂斂迹初五季時有外孔氏嘗冒聖緒因亂肆毒幾絶孔氏至其子孫亦假托世胄覬蠲徭役公曰是亂吾宗今不明後世莫知矣乃力斥其非絶不與通遂以宗譜重刻石廟庭本支源委粲然别白千百世之下雖有昧冒不能紊也四代祖考墓隧之碑闕公皆建立上以昭先德下以詒孫謀其志勤矣哉凡族有喪不能舉邑有窮獨死無後者往往具棺斂以葬之人有孤子女貧無以嫁娶者又給資裝為之嫁娶今襲封衍聖公彥縉公之從曾孫也初在襁褓而孤公保育調護俾克成立歲時祭享皆主於公而事無大小不避愛憎一切視為已任由是內外族姻無不順適賔禮往來各得其宜至於督修廟宫而著其功能墾復土田而增其歲廩衛先陵而申樵採之禁贊公府而杜請謁之私凡於宗家無不盡心焉乃以永樂十年十一月八日終於正寢是月丙午葬祖林之原孺人畢氏有賢德克相其家後公五年卒其葬也袝於公墓子男三人曰詢曰誠曰訔訔蚤夭女四人俱適賢士孫男八人公貞公英公欽公良公鋼公恕公禮公溫孫女四人皆在室嗚呼公之心純而正行潔而方才敏而周政通而和孝友忠信出乎自然髙懷雅量不見畛域而又文以詩書節以禮樂雍容揖讓於其間信乎神明之裔卓然不可及矣而遺愛之在人者詎可泯耶謹論次其德善用表諸墓以告來者贈右春坊右庶子楊公墓表聖天子纘承大統臨御萬方治定功成乃永樂十年春三月詔天官錫誥執政與侍從之臣於是右春坊右庶子兼翰林侍講建安楊榮得推恩及其考妣考贈奉議大夫右春坊右庶子妣贈太宜人榮既拜寵嘉遂敘次公之行實求為墓表公諱伯成字士美其先關西大族唐末逺祖某仕於閩後子孫遂為閩人有諱達卿者積仁潔行孜孜不倦雖昆蟲草木不忍傷其生嘗讀范益謙座右戒范氏義田記愛之令善書者揭之壁間俾子孫出入觀省以為訓實公之考也公為人謹厚事親能致孝處昆弟能友愛教子姓以義方遇內外族姻舉雍穆無間言接鄉人能以禮下之讀書每至忠孝節義之事又喜懇懇為人誦説遇人窮乏樂賑之不獨宗族子弟資給而得所教養至於外氏甥姪貧不能立者亦皆指廬授業撫育而婚嫁之不獨內外之親為然至於鄉里之間寒者賴以衣飢者賴以食貧困者賴以周急歲時伏臘察其甚窘迫者雞豚壺漿輒掇以遺之而賴之者尤衆其有鬭爭持兩端就公正之皆得其平而去嘗卜居近雲際峰與龍津舊廬相望山水明秀喬林清池森碧可愛乃立堂曰雲山樓曰藏書日優遊於其間為所知舉茂材徵書纍至以母老力辭不起後復以孝廉徵例以子官得賜歸既歸當道者以其子列官於朝數欲見之公固以疾拒自是足迹不至城府六年春庶子蒙賜上尊臘肉嘉果乃遣家童馳獻公家童至未卒前六日也越三日公遂薦之家廟合宗黨設宴以饗之酒既行舉盞祝曰荷先世積德衍慶於吾子而吾獲沾恩賜何其幸也今日與諸公固當盡歡人生宇內寓形爾恐後會難期聞者皆驚愕其言莫究所以然亦不敢訊又三日復趣家人具酒食召諸弟姪至且飲且囑曰吾平生無德及人承先人遺澤以有今日今其已矣死生命也若等無庸戚慎毋厚葬所斂衣衾止以布帛擇地止溫厚及時襄事毋拘術數人有假貸而不能償者悉折責棄券語訖遂就枕至夜分奄然而逝實是年四月草有八日也得年五十有六配劉氏有子五人長即榮也次富次惠先公卒次信次貞女四人孫六人某年月日葬某處嗚呼昔連處士應山一布衣終於家應山之人思之而不忘夷考其行之大端不過散資以賙鄉里出穀以平市價而已至其子舉進士為縣令人皆以為陰德之報今公世有善行視連過之逺矣而庶子之顯融上及其親其視連又可同年而語哉况死生之際亦大矣公預燭於事而不亂非其心曠然無纍於物者能之乎是皆人所難能者乃揭以為世之勸文淵閣大學士兼左春坊大學士贈資善大夫禮部尚書諡文穆胡公墓志銘永樂十六年三月文淵閣大學士兼左春坊大學士胡公以疾在告上命太醫視藥遣中使勞問無虛日而公之疾日篤未卒前三日謂儼曰廣荷朝廷厚恩無以報稱今至此其命也惟其不朽將子是託既卒翰林侍講鄒公緝狀公之世代履歷其孤穆奉狀來請銘公諱廣字光大姓胡氏其先居金陵曰公霸仕南唐為吉州刺史子勝徙居廬陵之薌城七世至宋資政殿學士忠簡公銓以忠義表見於世又五世曰敬之宋修職郎始徙吉水之大洲遂家焉曾祖鼎享祖彌髙皆業儒以德行稱鄉里父子祺洪武初以儒學進官至延平知府延平公昔遭喪亂於鄉人有陰德其仕也於民有惠政公生八歲而孤母吳氏故元進士永豐縣丞師尹之女賢而能其家公教育於母自幼恭謹不縱為子弟遨嬉事及長知好學日記數千言能自策勵卓然有成嘗遊閩廣間賢士大夫見其才氣皆折行輩與交謂他日必成大器既歸慨念先德不肯隨人後乃入邑校為生員未幾以詩經領鄉薦遂中進士甲科為翰林修撰一時名聲大振衆謂延平有子矣及遇上龍飛入正大統公首被選擢為侍講轉侍讀領代言之任日見親信公為人重厚寡言小心慎密上尤重之永樂二年三月由侍讀升右春坊右庶子五年十一月拜翰林學士兼左春坊大學士而寵任益隆公既以文章為職業於羣書百家之言博極其底裏停蓄深廣發而為文志趣髙邁沛然若決江河莫之能禦而制誥命令諷諭告戒文辭爾雅上宣德意下達人情莫不悚動感悅故倚注之重錫賚之厚加於等倫七年二月上巡狩北京公與左春坊左庶子楊公榮右春坊右諭德金公幼孜皆扈從明年二月上自北征三公亦從出居庸踰野狐嶺涉興和以入沙漠其道塗山川之所經風氣之所接與夫王師破虜功烈之烜赫皆命公紀文勒石鏗訇炳耀超越古今上既還南京諸大臣暨公等並錫誥而延平公得贈翰林學士母封太宜人十一年春上復幸北京明年再扈從出塞有功而還是年冬公遭母喪特賜內帑敕令襄事起復既至入見上慰勞甚至十四年三月進公文淵閣大學士仍兼左春坊大學士楊金二公俱為翰林學士公前後為試官考第進士皆合公論得人尤多上嘗命儒臣纂修國史公為總裁官書成既進公在疾上命即公家賜文綺襲衣鈔錠公既拜賜竟不起以是年五月八日卒於北京官舍春秋四十有九上悼惜之命有司治棺斂贈資善大夫禮部尚書諡文穆賜祭者再恩榮始終之盛縉紳之冠也公娶夏氏封宜人子男三人穜穆穗女四人長適陳年餘在室孫一人善裔女一人有司具舟遣官與穆護喪南還將以明年旦日葬某處公平生所著有文集若干卷詩若干卷藏於家於戲國家六合混一人文昭宣民物康阜而論道經邦佐理贊化措天下於乂安則有公卿輔弼股肱之臣夙夜匪懈以修厥職至於論思宥密侍從左右以學術文章潤色鴻業黼黻至治於其間亦必有英偉特達髙世之才而後能化今傳後埀之無窮若公者今其已矣烏可以泯故敘次其始終而銘焉銘曰有美胡公質茂而豐蚤承家艱允迪孝恭種學績文不同為工揭德振華譽望日隆既鶱既舉蔚為儒宗飭其才能掌帝之制鳴玉曳組荐膺寵寄孜孜竭心登崇禁林論思左右恩顧益深盛德至治歌詠鋪張宗廟朝廷郁郁洋洋誕敷文命洽於羣情昭示四海逺揚天聲生既尊榮歿加顯名始終之眷莫之與京維德維績於時有光勒銘斯石永世不忘贈資政大夫禮部尚書吕公墓碑聖天子即位以來四海寧謐庶政咸和乃嘉股肱之臣能協恭於理懋明顯功特詔錫六尚書誥遂推本其祖考而褒崇之於是禮部尚書吕震得贈其考吕公為資政大夫禮部尚書永惟對揚休命光昭潛德以埀示久逺乃來請文將歸而刻之墓石按吕氏其先系出薑姓封於虞夏之際子孫因以國氏歷漢魏晉宋隋唐世有聞人自宋以來在河南者以相業顯在京兆藍田者崇厲行義著聞天下而僕射為元祐名臣公蓋藍田裔也諱宗信字子節世為咸寧人祖諱某父諱敬甫贈禮部尚書母張氏追封夫人公自幼端恪長益敦茂讀經史究大義凡古人行事得失曰善吾法不善吾戒以自修飭長安漢唐舊都習尚侈靡公一切脫去不混流俗內孝父母外睦鄰族篤交恤匱一以忠厚積善為本嘗曰居鄉不能力善為政不能濟物非丈夫也以是朂諸已亦以是訓諸子弟以是行於家亦以是語諸鄉䣊親友以故人益仰重咸謂公長者公平生志趣超逸遇山水佳勝輒命酒賦詩自娛怡然也生五子長即尚書次萃庸巽文嘗告諸子曰吾不幸早值元季弗克有所成今汝輩幸遭聖明非學不足以立身宜勉之洪武甲子尚書以文學取科第纍官山西北平按察僉事今上入正大統擢為大理卿繼升刑部尚書復改禮部忠直自信惟寅惟清上嘉其能士推其正繄公之教然也尚書為刑部時公尚無恙祿養榮厚士大夫歎慕之以永樂三年十二月二十六日卒享年六十有四葬於櫟陽之原既葬之七年有褒贈之命配蓋氏封太夫人嗚呼惟公見善明故行之也恪積德厚故發之也大天道之報善人非偶然也尚書既克顯揚其親祗承寵光復謀刻石以詒後世可謂至孝銘曰吕為著姓世有顯聞中晦而蟠族益茂蕃惟公承之克濬其源不有於躬乃啓後昆是生令子遭時明聖遂躋顯庸以𢎞世慶鐵冠繡衣斧節煌煌出廉晉兾不逺其鄉乃司廷平乃掌邦憲乃秩宗伯荐膺寵眷巍巍廟堂珮玉瑲瑲侍帝左右邦家之光惟此顯榮惟忠與孝惟子之賢惟公之教帝念本始有錫自天煥乎龍章賁於九泉生崇令名歿有褒錫莫榮於爵莫大於德刻文兹碑惟後之式宣聖五十七世孫襲封衍聖公神道碑銘公諱訥字言伯姓孔氏世家魯曲阜前資善大夫襲封衍聖公諱希學之子元中奉大夫襲封衍聖公國子祭酒諱克堅之孫嘉議大夫襲封衍聖公纍贈通奉大夫河南江北等處行中書省參知政事護軍魯郡文肅公諱思晦之曾孫實宣聖五十七世孫也公魁梧厚重寡言笑篤學恭謹不以貴胄驕人士大夫喜與之遊樂善好施遇孤貧不克婚葬者雖傾資濟之無難色又能詩工篆法人得之者皆傳誦誇美相貴重華問益彰洪武癸亥居父憂以國哀赴京祭孝陵既竣事入見天眷甚隆顧謂廷臣曰孔訥真聖人子孫遂賜膳光祿命禮官館於太學遣尚書劉仲質勞問日繼庖廩復賜衣物鈔錠充牣舍館將俾襲爵以居喪乃止服除丙寅正月朝京師既見上大喜即命禮官卜日授爵於是以二月二日拜襲封之命受誥大廷百僚班列仍敕禮官以教坊樂導送至太學學官率諸生二千餘人迎於成賢街觀者莫不贊歎光榮明日入謝復賜襲衣宴於禮部又明日釋奠於學廟以拜命告恩禮之加古未有也初行誥詞吏部奏用資善階聖諭曰既爵公勿事散官但誥以織文玉軸為異耳遂為故事每歲入覲得給符乘傳班序列文臣首厚其廩餼下及傔從此又古未有也公天性仁孝待宗族克盡禮意奉祭祀極其嚴敬至於廟庭修作朝夕程督竭其心力不以為勞洪武庚辰九月十六日竟以疾終得年四十有三以某年月日葬祖林祔考墓也夫人陳氏繼商氏王氏子男四人鑑鐸鈞鏜鑑襲封衍聖公後公幾年卒女五人長適李添祥次適宋平次適王騏次適侯正次蚤卒鑑之子彥縉今襲封衍聖公公之冢孫也曾孫一人原嗣公歿後二十年墓無文彥縉將樹碑墓道以昭先德來請銘其詞曰維道之髙維德之厚金聲玉振以昌厥後歷世五十而又七葉偉矣聞孫克紹先業宇量恢恢威儀怗怗明詩習禮光華煜燁天之所與族之所宗保佑申錫格於宸衷榮名尊爵超軼顯融寵恩異數維聖之崇佩仁服義如守憲律終始惟一靡有愆忒由來龍蛇賢人之嗟溘爾長逝德音孔遐祖林之原楷木蒼蒼若斧若堂昭穆相望維公之兆祔考宅幽既封且固世德作逑延畀後昆慶澤斯流刻詞樹碑永昭厥休灌城阡碑永樂六年戊子九月十日先公直翁先生卒於家是年十二月丙申葬南昌灌城鄉懸榻里施家窯之原先是洪武癸酉六月十五日先孺人卒以其年十一月十九日卜葬是原至是先公遺命葬右壙而孺人次左也初有表志無貞石未刻今得餘干梅溪之石謹述隱德懿行用志諸阡云嗚呼胡氏之先系出不一公之族近出新淦之城口自經喪亂族逺譜逸不知始所從莫適其系也自六世祖十三承事宋端平間始遷邑城之南髙祖紹久曾祖祿賜祖子復考誠叔惟世懷德弗耀委祉後胤公諱鼎字重器自幼恪慎端莊屹然如老成人從鄉先生聶則正受春秋業成值元季兵亂與先孺人奉二親避亂田野間竭力致養未嘗乏絶以戚其親親沒雖喪亂中葬必以禮不敢茍且以儉其親既襄事時南昌為龍興當省治有兵衛乃與兄虞部府君徙家焉復遭喪亂家屢燬於兵入國朝沐浴濟化始寧厥居前進士鄱陽程國儒來為郡守造就人才立賞試格進諸儒生第其業之髙下而激勸之於是虞部與公各以其業就試連得髙等而虞部且魁多士後虞部以薦徵與公握手别曰凡出而仕君臣之義也弟教子孫毋墜先業孝弟之道也公自是日取詩書禮樂用教導其子若孫雖祁寒盛暑不懈儼幼蒙暗公程督之尤切及令桐鄉迎公就養時民有獷傲欲置諸法公聞之曰此愚民教未浹爾遽置諸法於政云何且為政不可不慎一或過當傷和纍德非細故也儼凛然佩服終身不敢違公嘗以僑寓違逺丘隴每歲春和不逺數百里拏扁舟歸故里具牲酒上冢退合族里之人敘宴而還家居祭享揆時備物俯仰齋肅雖老亦悲戚處鄉里恂恂然未嘗有所忤雖僕奴輩待之無嚴辭厲色與人交忠信篤敬衣食有餘樂振人之窮急貸不能償者亦置不問人有善輒樂慕稱道之有不善者誘掖勸戒開其善端而率德改行者亦多有焉其有爭短長曲直持不平者得公一言而釋以故君子喜其公小人樂其和而德義尊於鄉傅先生箕熊先生釗與公交久重公為善始終無間乃相與稱號曰直翁先生嘗以子官封桐城知縣享年七十有八以壽終葬之前期雨親賔祖奠者咸以為憂至夜中雨止風泠然詰旦發引日皎然如春藩臬大夫郡邑官僚與凡執紼人士載道咨嗟及壙窆工人執事者皆汗浹背咸以為此公之素行獲乎天者非偶然也孺人徐氏先十五年卒儼聞之公曰汝母性純惠蚤喪母事繼母能篤於孝敬既婦於我事舅姑凡衣服飲食奉養之事必躬理之蚤暮不怠二親深自慰恱歲壬辰兵變鄉里焚掠殆盡人少食家藏多亡汝母幸存服飾之具日以易粟奉二親不異平居不幸二親繼歿內外宗姻間隔獨與汝母匍匐襄事甲午荐飢加之疾疫邑井蕭條遂徙龍興凡治居舍生業立家之道汝母能以勤儉助我未嘗面憂戚之色凡若此者汝兄弟蓋未之知儼幼在先孺人膝下孺人口誦孝經論語教之及長知事事見孺人歲時左右祭祀牲醴粢盛必豐潔待賔客酒食必精旨接親戚無不順適遇子婦嚴而愛雖疾病無廢容卒之年春秋六十也後八年以子官贈孺人子四人長長壽次發次即儼次慶女二人長壽慶與二女俱夭孫七人旭昱􅌔杲曄曦昭昱杲蚤卒今存者五人孫女七人長適劉正學次適劉朝英次適進賢令餘杭吳英次適徐用中次適劉錤次適王恆次適毛宣曾孫九人訓讓諲謹詢訥欣詡詠曾孫女六人距先公之葬十有八年先孺人之葬三十有三年實為洪熙元年歲在乙巳正月十一日復蒙推恩賁於冥漠先公加贈朝議大夫贊治少尹國子祭酒兼翰林侍講先孺人加贈恭人踰月儼以疾休致而歸又踰月乃克告於墓深懼衰朽筋力不任恐一旦泯沒則考妣之德善鬱而不彰不孝之罪莫大焉謹銜哀具述本末敘次如右俾後之子孫庶得以為憑藉之資也男前史官嘉議大夫太子賔客國子祭酒致事儼謹志故元集賢司直曾公墓表永豐曾氏系出郕國公逺有代序為吉名族至元集賢司直諱如瑶字尚賢乃應奉翰林文字兼國史院編修諱巽申之子宋監察御史兵部侍郎江西安撫制置使諱希顔之孫宋主管浙西帳司文字贈通直郎諱元老之曾孫母胡孺人生公有異徵幼與羣兒處不為嬉戲屹然如成人從師學日授數千言輒背誦不失一字人皆以應奉為有子矣既長通書經天厯間侍應奉居元都用選補太學生其授集賢司直揭文安公之薦也未幾以應奉憂去官奉喪南還遭元季之亂慨然有康濟之志時進士吳伯都刺佐江西省幕率舟師討冦公以策干之不能用郡别駕蕭額森舊與公同監舍薦之郡守梁克中乃檄公主永豐縣簿公至欲有為而事已去不可復振即挈家去隱玉笥山中入國朝喪亂既平乃歸葺田廬復先業洪武初遂應詔長鄉之田賦征斂以時不為暴刻或勸之加量公曰吾祖父以來量如是卒不易後以事遷鍾離年六十有八洪武丙辰正月三日以疾卒殯天井岡某年某月日自天井岡啓葬於鄉之某原配周氏子四人長洵次源次潛次潼女三人孫男幾人曰棨翰林侍講曰棐曰檃棨懼公之潛德不耀乃以狀請余惟公以文獻世美力學踐行故能安於去就埀休燾後豈有涯哉乃本厥初著其實表諸墓上以畀厥胤先伯父虞部府君行述公諱璉字汝器姓胡氏世家新淦自幼有大志當元季見為政者尸厥官胥徒縱橫蠧蝕民奮然欲有所樹立以利夫人而不得自效居常悒悒聞廬陵鄒先生選與其弟連講學於清江封溪之上即束書往受業每下筆為文章有竒氣鄒先生輒稱善業既成而世難作矣遂與先生自淦徙家龍興荐經喪亂乃混迹賈區人莫知其儒者也及我太祖高皇帝廓清海宇儒術用興於是郡守鄱陽程國儒進諸儒生課其藝之高下以行勸賞公乃與先公各以其業就試適喪亂之餘程侯暨諸儒師得公昆弟文字於多士中嘉歎不已特置公第一再試三試皆在高第洪武初與廬陵劉子高清江張仲謙俱以明經薦至京擢授工部水部主事兩考升本部員外郎又三年轉虞部員外郎公性剛毅論議確然遇事矯枉輒欲以直繩之同列多不喜譖於宰執宰執亦不喜因中以他事遂左遷通判廣州居二年復以事解官歸卜築清江往來豫章忽一日告其從子儼曰昨夢賦詩末句云歸去來歸去來山中故人久相待吾其歸矣遂拏舟泝江而上至生米值風濤而沒實洪武十八年二月三日得年五十有八從子發督水工操二舟自沒所至彭蠡湖往返七日求公竟不得嗚呼痛哉配劉氏子男三人頔頴顗頴蚤卒頔為盧龍丞卒於官顗亦繼卒有二孫戍遐方公文集若干卷在二孫所存亡不可知公為政嘗聞其大者若工之陶冶常之河渠吳之海運淮之海艘皆為劇務公實經理於權輿之日後來者得有所據而公之勞乃鬱而不彰悲夫又嘗承乏禁林得見公應制詩文徒為之慨然公平生喜為詩宋學士景濂尤愛其長句謂有唐人風格今記憶僅得若干篇殆存一二於千百嗚呼惜哉公之德操行義凛然無愧於古人至遇事理之曲折在他人纍百千言不能别白公片言剖析即了然開釋合乎至公人皆稱之曰能然其所就卒如斯天乎人耶莫可得而知也所可知者其可泯乎謹述其大槩如右後之覽者即斯文亦可知其人矣夫故延平知府贈翰林學士胡公宜人吳氏墓志銘永樂十二年十二月二十有四日故延平知府贈翰林學士胡公宜人吳氏卒於家其子翰林學士兼左春坊大學士廣聞訃即設位哭儼既弔而退越三日乃命其門人述宜人之世系德美來告曰廣生甫期月先府君拜御史之命仕於朝時兄姊俱幼太宜人專家事教子女讀書事女紅課僮奴治田圃種植畜養皆有條理先府君守延平不幸棄諸孤廣生八歲也太宜人喪葬盡禮悲哀成疾幾不能起及瘥日辟纑置論語膝上以教廣曰汝無父吾寧必汝之有成也廣雖幼無知然聞太宜人言極悲痛謹識之不忘廣兄弟不天鞠育教誨皆太宜人之德與凡扶持門戶官府之供賔親之禮男女長幼衣食百需之具又皆太宜人經理維持之力及廣際遇聖朝叨列侍從荷推恩特封太宜人逺埀教訓懇懇一旦至此極終天之痛何有已也然所以昭後世者幽室之詔惟子是圖按宜人諱瑞慶姓吳氏世為廬陵永新人父師尹故元名進士永豐縣丞母龍氏宜人生衣冠宦族自幼間禮訓通經史又善筆札至於剪製紉縫之事皆極精緻父母甚愛之為擇壻少得如意者獨延平君在生徒中器質端方學問篤實遂以歸之宜人自入門金珠綺紈悉脫去不御躬操井臼執婦道以相其夫子於喪亂艱難之日人以為難延平嘗撫育其從孤弟妹數人為之婚嫁宜人能推所有與之宗族皆稱其賢仲姊寡居無子宜人迎歸養朝夕暇時二母坐一室講詩書論古今亹亹不厭傍置諸子誦讀與正句讀訓難字鄉閭之間尤讚其美今學士以文章黼黻至治為邦家聞人有由來矣宜人常恨不及事舅姑遇節忌嚴祀事於家命子孫拜掃於墓終始如一又性聰明善記族黨兄弟有所遺忘即咨詢雖數十年事歷歷舉之無毫髮差爽享年八十有二以夀終實永樂十二年十月三日也明年某月日葬於某山之原子二人長直次即廣也女四人長適劉子仍次適黃志榮次適徐崇威崇威宿州知州次適解與高孫四人穜穆導穟女五人長適劉誠次適陳年餘在室曾孫二人善裔善嗣女一人銘曰猗歟宜人夙鍾令德爰及於行克修內則延平之終厥家孔艱諸子在幼鞠育以安訓之書詩俾克嗣肖婦功母道族閭思效維兹懿美受天之祐寵章命服光於眉夀詵詵孫子蘭茁玉滋厥後式榖衍慶流輝猗歟宜人世實罕儔刻此銘詩用昭厥休故通議大夫兵部左侍郎盧公墓志銘永樂十四年十月六日兵部左侍郎盧公卒年五十有六自公卿大夫以及掾史執事之人與凡鄉里交遊之士莫不痛惜之時儼還自北京既弔哭退其家人攜其七歲孤欽持公世系履歷拜而來乞銘余與公友也且子壻於公義不可辭乃敘而銘諸公諱淵字文濊南昌之新建人曾大父蘖大父德父朂世業醫有陰德公幼孤母某氏教育之既長入邑校為生員清苦力學遂以詩經充貢登胄監歷事兵部洪武二十五年夏五月選授司馬主事二十七年秋七月升員外郎尋升郎中三十一年夏以賢勞擢本部右侍郎未幾罷壬午冬有詔復起為左侍郎公為人篤實操履端正遇物恕而蒞事勤故自為主事有能名及為員外為郎中歷年多而知故實凡視事劇及暮同列退公獨秉燭治文書不少懈侃侃自將未嘗矜伐以此人皆心服之至為侍郎專檢校貼黃其條貫節目文理浩穰不得要領者其事多繆戾獨公任之貫穿錯綜皆有條理人又服其能嘗督工運木河上威惠兼濟事集而人不勞永樂十一年夏進表至北京居會同館疽發背危篤上遣中使賜以善藥日往候疾重輕以聞凡兩月疾瘳入謝又賜物甚厚既還獨領部事知無不為僚屬稟承政修事舉乃以子敬夭死悲感成疾逾年竟不起哀哉卒之日朝廷遣官諭祭憫其遺孤特給米五十石鈔三千貫恩禮隆矣將以某年月日歸葬某鄉某里配胡氏子男二人今所存者欽也女六人長適某人次適胡暕餘在室銘曰維夀不躋維德有餘維澤不渝以遺其孤贈資政大夫戶部尚書夏公夫人墓志銘夫人姓廖氏其先荆州人元處士諱瑞可之女贈資政大夫戶部尚書夏公諱時敏之夫人今少保戶部尚書原吉之母也元季處士寓沔之玉沙以經學教授生徒時資政公之父某為湖廣行省都事聞處士學行命資政從之遊以兵變不果行未幾鄂城陷都事歿於義資政奉其母入沔見處士與語大器之曰都事義士也可謂有子矣其後必昌遂以夫人歸焉入國朝喪亂平資政乃徙居長沙之湘陰洪武初教諭邑庠復以母老歸養而卒夫人奉其姑盡孝敬雖處窮約未嘗有幾微不足之色其姑安之教諸子嚴而愛嘗訓之曰吾見汝父辛勤一世手不釋卷今已矣汝幼孤何恃復歎曰人生世間其業有四惟士為貴汝等得為士非惟不墜先業亦汝父之志也於是遣原吉入邑庠為弟子員又訓之曰吾聞與善人居如就芝蘭久與俱化與不善人居如就蕭蒿久亦與化汝其識之姑疾夫人侍湯藥惟謹朝夕不離寢處姑執夫人手泣曰汝事我備極勞苦我老疾必不起念無以報汝願汝夀過我子孫事汝同汝事我姑既卒夫人葬祭如禮及原吉領鄉薦仕為户部主事迎夫人就養後七年原吉升侍郎夫人以子貴誥封太淑人又五年原吉拜尚書考贈戶部尚書夫人進封太夫人太夫人慈惠溫恭而有賢子經綸通變出納和鈞以掌邦計為時名臣而太夫人夀考尊榮世稱賢婦賢母焉享年八十以疾終於北京實永樂壬寅四月十九日也後二年奉命給舟楫第三子原禮載柩歸以是年某月某日葬某處子三人長即原吉次原啓次原禮女二人長蚤世次適常州府照磨葛興讓孫四人琮瑛琪璨女四人長適監察御史傅霖之子俊次適宗人府經歷虞進之子㻞餘在室昔韓滉識楊於陵為佳士謂其有後遂以女妻之生嗣復卒為相方之處士之於資政及今尚書公豈不信哉儼獲交尚書公嘗拜太夫人於堂上見太夫人禮貌從容辭氣詳雅固知其夙秉隂教者尚書公乃以墓銘見屬謹按林諭德志所述事略敘次如右而為之銘其辭曰懿懿夫人生於德門克嫓君子陰教式遵遭家孔艱夫先其歸上下老幼養育於嫠姑疾不起寢食不離勤勞孝順姑祝有辭撫字諸孤慈訓懇詳善積慶衍世澤其昌表表尚書贊理廟堂推恩顯親命服用章祿養式崇既夀且康湘山蒼蒼湘水泱泱惟卜之吉夫人之藏刻銘置幽永世不忘晉侍中大將軍溫忠武公廟碑豫章城南之有晉侍中大將軍溫忠武公廟者以公之墓在也公咸和初為江州刺史持節都督平南將軍鎮武昌豫章乃江州刺史治所也公至豫章親祭徐髙士之墓仰其風節愛其山川言於朝曰豫章十郡之要宜以單車刺史居之事雖不行而心實重焉故臨終之日與陶侃書蓋公之葬豫章侃從公之意也後朝廷追公勳德將為造大墓於元明二帝陵之北侃上表并公書得停移葬今廟之後有坎隱然實公之墓故老相傳舊碑載墓去廟三十步初廟近排岸司瀕於江歲久為水嚙今廟徙臨墓矣而舊碑亦湮沒世俗無知者因訛為宋司馬溫公豈以公嘗為劉琨右司馬故耶鄉人歲時祀事惟謹有以事禱者輒不得卜復禱曰廟無碑豈非欲得祭酒之文乎遂得卜嗚呼公之事載諸史册章章然輝映今古公之精神上下與天地同流亘千載猶一日公豈以余言為足傳耶特以余能正其訛耳謹取公之履歷始終大概著於後使讀者知公不復訛為涑水先生也按傳公諱嶠字太真河東太守憺之子也初為都官從事東閣祭酒補上黨潞令平北大將軍劉琨夫人公之從母也琨請公為參軍復為從事中郎上黨太守加建威將軍督護前鋒軍事將兵討石勒屢有戰功琨遷司空以公為右司馬屬二都傾覆元帝初鎮江左琨以公為左長史檄告華夷奉表勸進帝嘉之尋拜散騎常侍歷驃騎王導長史遷太子中庶子明帝即位拜侍中轉中書令王敦逆謀表補丹陽尹公還都奏之加中壘將軍持節都督東安北部諸軍事及敦兄王含同錢鳳奄至都公燒朱雀桁以挫其鋒擊含敗之封建寧縣開國公進號前將軍時歷陽太守蘇峻藏匿亡命朝廷疑之公遂有江州之命未幾峻果反公屯潯陽遣督護王愆期西陽太守鄧嶽鄱陽內史紀瞻等率舟師赴難及京師傾覆公乃遣王愆期奉征西將軍陶侃為盟主於是侃率所統與公同赴京師戎卒六萬旌旗七百餘里直指石頭次於蔡洲峻聞公將至逼大駕幸石頭公又於四望磯築壘以逼賊侃督水軍向石頭公與庾亮率精勇從白石以挑戰時峻勞其將士因醉突戰馬躓為侃將所斬峻弟逸及子碩嬰城自固賊將匡術以臺城來降為逸所擊求救於公公從别駕羅洞言進攻雀杭遂破賊石頭軍奮威長史滕含抱天子登公舟時陶侃雖為盟主而處分規略一出於公及賊滅拜驃騎將軍開府儀同三司加散騎常侍封始安郡公邑三千戶議將留公輔政公以王導先帝所任固辭還武昌公先有齒疾至是拔之因中風至鎮未旬而卒年四十二江州士庶聞之莫不相顧而泣帝下册書追贈公侍中大將軍持節都督刺史公如故諡曰忠武祠以太牢公之本末如此嗚呼公當晉室之微能以勞定國豐功偉績不獨著於王室而豫章之人不受王敦蘇峻之禍公之利澤深矣公不棄豫章而妥靈於此豫章之人豈能忘公此所以世世祀公而不絶也公之祀應祭法余故表而出之求余文者鄒鵬南復作詩以遺之俾與其鄉人歌以祀公其詞曰五馬浮江典午微中原雲擾竟莫支惟公天授豪傑資𢎞毅有猷復有為仗劍南來歷嶇﨑翼戴王室昌厥詞羣賢滿朝挹光儀王事靡盬勞驅馳逆敦憑陵肆侮欺神器振搖綱紀隳斷桁扼險公出竒指顧之間含鳳披凶峻結約逼郊畿乘輿播越徒嗟咨公復奮身舉義旗感激將士張國威羽書四發如星飛征西遂下荆州師指麾嶽瞻與愆期白石之役天相之殱厥醜類無孑遺策勳錫爵同三司廷議欲留公固辭旋艫南經牛渚磯犀光下燭號蛟螭翩然歸鎮曾幾時奄忽神遊哲人萎逺邇聞訃淚漣洏丘墓千載江之湄祠宇雖存人莫知神明昭格於赫燨井邑庇庥民實思有牲載俎酒載巵願公朝夕無我遺頤庵文選卷上欽定四庫全書
