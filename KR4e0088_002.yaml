body:
  text: 頥庵文選卷下明胡儼撰古詩述古圖書出河洛羲禹闡幽玄列聖繼有作人文日昭宣伸尼感鳯鳥至理寓微言自從秦漢來但見枝葉繁寥寥千載後濓洛探其源紫陽具條理埀裕啓後昆前修去已逺來哲未有聞瑰辭逞葩艷寧復歸本根蒼姬既訖録炎劉勃以興詩書煨燼餘禮樂邈難徵區區叔孫子莫能致兩生守文過謙讓俗吏事章程賈董失經紀二戴紊遺經遂令千載下擬述徒紛爭二儀有定位八風無姦聲公旦去已逺萬世思典刑屈子變風雅騷經寓孤忠光華並日月耿耿埀無窮後賢襲軌轍長卿得其宗招搖臨卭市放曠托絲桐淳風日以靡齊梁更纖穠逺遊謝紛濁超逸等冥鴻馬遷述世業博洽靡不通蚤遊燕趙間飄飄氣豪雄發憤埀制作獨見不相蒙馳騁覂逸駕凌厲六合中豈不念筆削斧衮齊化工蠶室有餘悲隱辭寓深衷緬彼班范流藩籬守遺蹤聖神御宸極朝宗衆流奔三正乃迭建萬化歸一元元經大一統表揭開蒙昏周綱既陵夷七雄相併吞晉紀忽中絶五部漲妖氛唐風復不振五季尤紛紜商丘肇火德星緯煥奎文道化擬三代經術規典墳一朝杜鵑啼匹馬渡河津王業寓南服繼統啓後昆如何太史氏編與附庸倫南北互譏誚厚誣多失真是非百世下至公終不堙僬僥不可舉侏儒不可援矇瞍不可視嚚瘖不可言玉人事雕琢所貴得瑶琨籙竹興君子猗猗美淇園相觀與俱化豈不尚芳蓀所以教誨善乃在公子歡賢良贊令美浦大川有源吁嗟斐然子狂簡非所敦閎辨談天衍文具雕龍奭公孫持堅白李悝盡地力荀卿獨老師著論推儒墨紛紛溷濁世龍虎互吞食大道隱不遂居然心惻惻金骨豈易銷奈此衆口蝕向使無春申焉能免匍匐汨汨數萬言性惡殊道德遂令上蔡兒西遊為鬼蜮寄語昌黎生匪惟不精擇炎綱失其馭孽臣姦日滋揚郎獨持戟三嵗乃不移閉門事草玄抉摘窮幽微髙者躋蒼天下者入黃泥一朝弄神器鬼怒人不怡如何守道叟亦復為詭隨伊周頌功德投閣良可悲中天二百載小數寧逆知凛凛紫陽筆師舜同一辭稽首素王宇為君懷忸怩鴻門宴髙張虎奮龍委蛇拂劍光凌亂雪花芙蓉姿起舞為君夀誰知伏危機歘然坐中人宛轉來相隨天意應有在人心徒嶮巇酒酣日將暮壯士直披帷一怒千人廢何為跽陳詞以彼蓋世雄未易向客卑武成二三䇿多聞須闕疑國風美王化關雎正彞倫結髮諧伉儷恩愛日相親窈窕慎淑儀嫌昵非所欣甘從冀子耨不厭黔生貧如何會稽婦呶呶醜負薪亦有薄行士殺妻求將軍所貴閨門內相敬如友賔舉案重髙義斷絲感微言嗟嗟白頭曲忍作清路塵雜詩大化運無極四序迭終始茫茫堪輿間萬物羅戢孴青陽振其華玄冬抱根柢物理有盛衰人生貴知止謙光乃自卑上善誠若水昧者徒紛紜達士甘窳呰孰云楚翹翹損者滿之招神龍絶嗜欲靜默藏深淵含和抱真陽珠光燭重玄一朝吐雲氣甘澤霈九天夭矯煙霧中變化出自然孰知積精至造化為控搏如何勞生者役役事多端豈復念終始宇宙浩漫漫倉庚鳴幽谷伐木正丁丁春風日載陽時聞求友聲若有一介士揄揚稱達生對面抗髙義中心藏甲兵薰蕕不同器申椒輒見憎巧言實亂德美色徒傾城嗟哉同心友獨立何煢煢安得玉川子為爾著門銘長松生澗壑矯矯抗丹霄根株蟠厚土雨露沃其條蒼翠太古色超遙非一朝清風四時至白鶴千歲巢如何燕雀羣喧啾乃見啁矧彼山椒卉亦欲凌髙標嚴冬霜雪降氣類各已銷獨此嵗寒姿青青終不凋幽谷有芳蘭緑葉紛旖旎光風泛藂薄香氣被華靃本無豔陽姿蜂蝶何斐斐既自逺荆棘乃復雜蓬枲佳期殊未央臨風益嗟只達士不偶俗棲遲在林丘孫登琴調古盧生草堂幽藥苗手自鋤長嘯天地秋人生貴適意吾道復悠悠屈子賦逺遊一氣中夜存柱史妙觀復萬物徒藝藝淡泊寧心志嗜欲憯棘矜端居達遵養自得多所欣萋萋碧階草靄靄青空雲吁嗟燕雀侣何如鸞鶴羣吾愛裴晉公眇然如子房功成廊廟上退身緑野堂飄飄芰荷衣蕭散遺軒裳佳賔日宴會髙論著文章清風激壺矢曲水泛羽觴涼臺抗髙雲綺席含秋霜燠館通窈窕嘉樹迎朝陽豈不念所事四序迭相當達觀天地間為樂殊未央擬飲酒效陶淵明十首偶爾得名酒日夕斟酌之顧影忽復醉回飈吹我衣頽然即枕席覺來還命辭歸雲返大壑栖鳥戀故枝人生貴知止汨汨將奚為以心為形役寓形復幾時人生匪不營所營在衣食田疇雖久蕪常業當自力有男種桑麻有女事蠶績耕織亦云勞嵗功幸已畢開軒弄書琴遊泳得間隟區區百年內所樂在昕夕幾日不飲酒飲酒輒開顔村墟寡輪鞅柴門晝常關幽蘭吐疏花榮榮生竹間白雲何處來日暮宿簷端流盼不覺暝明月出東山秉耒事西疇同為壠畝民所憂在飢餒豈不懷苦辛苦辛有時息田園遂吾真披徑攜童幼斗酒即此鄰相見多好言解顔共欣欣時當積雨霽樂此天宇新春風扇陽和草木咸敷榮山川被德澤天宇流光晶遊魚泳清川鳴禽變新聲亦有五男兒拋書事力耕田疇既霡霂更願桑麻成所資在口體粗給豈餘贏凱風自南來颯然入吾廬翻翻動書帙素琴聊自娛好鳥鳴前楹竹樹交扶疏北窗適間曠美酒湛清壺南山天際明浮雲空翳如門前五株栁籬邊幾叢菊栁衰枝易疏菊榮葉更緑故人值良辰相過慰心曲丘園登菽苴床頭酒初熟引觴還共斟寒花粲盈目翛然適恬曠遂爾忘局促朔風何烈烈場圃已新築相與納禾稼壺漿輒往復盡醉舒襟顔形迹謝拘束雞犬鳴深巷牛羊散平陸老稚雜笑談和樂知嵗足盤飱與粔籹墟曲走童僕四序更代謝流光去如馳顧匪金石堅詎可千嵗期昨日顔如花今朝鬢成絲寓形宇宙間為樂須及時有酒不快飲徒起雍門悲時運適其會達生貴自然聖逺道斯在豈必羲皇前悠然得真趣采菊見南山凛凛懷光烈脫屣如玄蟬嗟哉避俗翁髙風此其賢賦貧士效陶淵明二首車牛逺服賈刀錐競市區農工各有業而我獨何居栖遲衡門下白首談詩書源流仰洙泗渾噩窺唐虞終嵗不勤動經訓豈災畬祁寒敝裘單暑雨茆茨疏門前長蓬蒿室內無貯儲壺漿枉交親藜藿甘妻孥守拙塵土中幸免形迹拘質衰隨物遷心冥與化俱田園久蕪穢解組賦歸來翳翳三徑中稚子紫門開匪我與俗違俗情不我諧種苗雜稊稗種豆生草萊生計日已疏懸罄實可哀田父攜酒至慰我且舒懷偶茲值未登方春奚可涯感父殷勤意不覺倒樽罍酒中有真樂陶然百憂排古春意亭為張真人賦茫茫堪輿間孰究太古初天地混沌中一元根化樞運啓攝提格條風始吹噓勾萌茁萬彚人備三才俱至今千萬年元貞迭藏輸龍馬出河涘羲皇彰靈圖對待三十六淑氣總昭蘇初陽奮重泉黃鍾動葭莩太音閟清廟玄水湛方諸達人契玄理作亭靜以居和順自中積德音暢以敷萋萋階前草一簾生意舒園林度鳴禽柔荑藹芳腴懷哉廣成子至道不煩迂擬遊仙野水際平蕪汀洲渺芳杜驚湍激頽波日夜自東注巨鼇戴三山方諸隔煙霧仙人白玉樓紫房映朱戶晏景餐太霞遨遊入霄路弱水三萬里可望不可渡吁嗟塵土蹤擾擾空馳慕閲杜詩漫述間閲老杜詩懇懇得佳趣雖復率爾為玄酒有真味倉皇侍從時流落艱虞際百年朋友交萬世君臣義吐辭輒驚人引物動連類虞廷簫韶奏周廟瑚璉器鯨翻碧海波月照珊瑚樹勇決龍虎爭冥搜鬼神避千花與萬卉各鬭春光媚婺婦及孤兒共灑凄涼淚丹山翔鳯凰赤汗騁騏驥氣排嵩華髙力救風雅墜殷勤稷契心漂泊生涯寄斯人已云亡遺編獨傳世寥寥宇宙間詩史孰能繼餘波漾清川蘭苕鳴翡翠答楊少傅四首布政孟公朝京還同閫憲諸公相過出楊少傅勉仁所寄詩賦此謝答幽居寡儔侣終日無與言忽聆鳴騶振飛蓋集丘園入門敘綢繆故人乃見存遺我尺素書煥若得璵璠灑然濯清風盎然被春溫黃鍾大吕奏使我宿瘵蠲謬玷君子班悵然思昔年曝背坐衰朽中心徒殷勤山川隔良晤時蒙篋笥分古人重金蘭古道今人敦矯首寄遐思悠悠空白雲關西渺靈源七閩啓來裔迢迢白鶴山千載鍾靈異陰德諒斯徵英賢出名世乘時偶興運秉翰典中祕超遙三十年實與風雲際宥密贊化工中外仰經濟埀休暨後昆清白永無替囊中孤桐琴負疴久不彈玉軫映金徽徒縆朱絲絃成連去不返煙霧迷海山山水久寂寞諒彼知音難陽春固寡和别鶴亦辛酸迢迢牽牛星相望一水間璇霄廓纎翳朗月流素輝不寐愛清夜步月臨前池故人隔千里宿昔共襟期川途雖云邈相思同此時相思不相見中懷浩無涯仰視列宿拱紫垣正巍巍萬類荷甄陶默運玄化機真宰亦何喻中心應自知何由得披豁一寫暌違思春晴縱步䇿杕隨春風萋萋芳草緑陌上花正開田中雨新足彩鳩呼其婦烏犍舐孤犢雙雉何翩翩翻飛起林麓紫燕尋舊巢倉庚出幽谷柔桑葉始抽蠶種猶未浴野人自耦耕稚子相戲逐忽逢一老翁招邀過茆屋指顧兒與孫床頭酒初熟瓢分臘醖清不用葛巾漉一杯復一杯覼縷説鄉俗禮義日衰謝詩書少人讀田園茍嵗時人情多反覆天道亦好還此俗終當復老翁何時見庶幾豁雙目臨别重丁寧莫向他人續雨後時雨布甘澤芃芃黍苗興渙然紓民憂匪惟散鬱蒸陰陽運元化飢寒仰嵗登露坐息槐影皎皎涼月升清風動修竹曠野多流螢零露沾我衣仰見髙天澄絡緯鳴不休蟲飛復薨薨顧匪漆園吏幽夢同化冥池上納涼展席臨方池埀楊散緑陰清風颯然至驕陽赫流金竹光搖翠羽荷氣薰葛襟黃鳥何處來交交弄好音雖非采真遊已無塵俗侵平生厭喧囂始得諧素心驟暑端居適煩燠䇿杖散幽襟逍遙池上行愛此嘉樹林遊鱗泳微波黃鳥遺好音遙睇髙原緑欣然諧夙心疏雨忽飄灑浮雲生夕陰坐來屏明燭空對窗間琴陶然即枕席焉知古與今暑雨過晚涼蟬聲落葉宛有秋意時雨陰復霽漸覺暑氣消野色將欲秋蟬聲逈蕭條白髮非故吾黃葉下今朝老懷空浩蕩往事若驚飈外江老人詩并序龔海言越漸嶺之東二十里曰外江口乃進邑鄙也近偶過其處荒村寂然遙望林中孤煙起遂穿徑至其處見一老翁衡門之下童頂雪鬢古貌蒼顔於竹間取衣迎客入坐問其姓曰劉問其年曰九十八矣尋一老嫗逡巡而出方瞳長頥乃老翁之妻復問其年又加於老翁蓋百餘嵗也二子相見亦七十餘諸孫皆蒼然曾玄雜侍羅膝前唯唯可念須臾出茗飲客竟復脫衣挂竹上縛帚自若二子亦返舍結網諸孫取魚飯客老翁勸餐語雖俚而意甚真酬答之際邈然若不知有人間事也余聞而歎曰若斯人者雖功德不加于時名聲不昭于後夀考康寧長子老孫亦休休焉有餘裕矣蘇長公嘗云山人多夀蓋五藏真氣不為五味鹽醯所奪信哉外江有山人幽居枕湖堧青山日對門山下有良田問其嵗幾何屈指殆百年老妻夀更過方瞳神炯然草屋八九間兒孫列曾玄湖中種荷芰園內收木綿桑麻緑野布榆栁清陰連取篠日縛帚網魚時得錢見客禮數簡鬖鬖雪埀肩葛衣偶一披旋復竹上懸須臾出新茗洗盞向客傳呼兒具盤飱粲粲錦鱗鮮勸客加飱飯語俚意甚虔問客居何處客云漸嶺邊漸嶺我嘗到嵗月知幾遷城市多人事山中常晏眠不識府與司但願邑令賢前年賜束帛稽首戴堯天欲效康衢歌山野無詩篇松間吠乳犬草際卧烏犍雞栖日將暮暝色起蒼煙山頭月華白夕露涼涓涓頽然即衾枕翛翛若蛻蟬我聞客此語泠然身欲翾乃知寂寞濵有此長年仙何必煙霞外去問桃花源次韻一本集杜句見寄山林氣蕭瑟颯爽涼飈起緬懷滄洲趣迢迢隔秋水衰容日益枯短髮還自理素懷玉壺冰敢謂凍連底昔玷蓬萊班忝紬金匱史出入承明廬遨翔綵雲裏夾座侍宸旒簾開宫扇啓九成鳯鳴韶兩觀雉層壘髙步接夔龍傾心竭螻蟻抱疾困沉綿歸來竟如此服食求金丹神仙渺何許誅茆傍江郭修竹映清渚窗含梧葉風坐對芭蕉雨雖非諸葛廬頗似蘇公圃蛩響悲早秋蟬聲咽殘暑司空即王官六一思潁汝玉笥白雲深矯首瞻天宇貂蟬樹功勳疏爵公侯伯我獨事文翰於世寡才識驅馳四十年白首空自惜橋山隔紫煙蒼翠難再覿謝病遂歸休苦被形骸役時時倚孤松引領瞻天北幸爾托絲蘿數慰幽栖迹瓊章詩律清屐齒苔痕碧鬢顔各老蒼燈火思宿昔得諧今日歡免使遙相憶涼夜理琴涼飇驅浮雲萬里天一碧逺響振寥廓林木聲槭槭開軒散幽襟坐延月華白抽琴理故曲操㺯輒間格山水有遺音悵然心不懌齋宫接清晏俯仰思宿昔矯首望鈞天泫然淚沾臆暑中詠懷翳翳榆栁門幽栖遂間情蠧簡掩殘編燕寢凄餘馨園林足生意城市多喧爭柔荑新緑遍好鳥對我鳴莘老任先覺尼父畏後生歸來幸無事松竹有餘清徂暑盛炎赫臨池愛清漣蕭蕭素絲短皎皎白紵鮮苕風飄翠羽林影悲玄蟬泠然逺響至黃落當我前人生匪金石流光如逝川頽齡思往日壯心非昔年故交日淪謝衰老天憗遺翛然緑樹間野服頗相宜賔客亦畏暑經旬故來稀獨臨清池上憺然忘是非遙海上明月幽林生夕霏人生穹壤間取適能幾時村居秋興間居南郭外水竹清且幽芳草被曲徑逺樹浮滄洲出門臨方沼欣然見魚遊賔客時一至燕談敘綢繆開樽共斟酌真率無獻酬日暮各自歸新月上林丘人生在衣食營營無時休江湖多風波隴畝幸有秋稚子雜歡笑老翁亦醉謳日暮載禾去柴車繞道周我獨困沉綿塊然何所求田野絶追呼卒嵗聊優遊五言律詩豫章十詠西山逺翠萬古不改色千尋翠黛饒染空寒欲滴映日暖還飄窅窅猿啼暝翩翩鶴去遙望中天路近飛佩入煙霄南浦飛雲南浦千年在滕王歌舞休江煙同漠漠潭影共悠悠不學化蒼狗長留伴白鷗朝朝與暮暮還送水東流徐亭煙栁髙士去已久清風不可攀惟留數株栁長伴翠煙間陰連芳草碧色映古苔斑塵榻無人掃鳬鷖自往還蘇圃春蔬湖上蘇公圃青青春雨餘何須抱甕灌自可帶經鋤獨客生涯足故人音問疏如何松徑裏今日有來車鐵柱仙蹤非鐵亦非石屹然方沼中本因驅罔象謾説是鳬翁雞犬攜家逺蓬萊有路通千秋萬嵗後八索著神功洪崖丹井聞有古仙客紫髯九尺軀浴丹洪崖井脫屣白玉壺碧蘚春陰合寒泉夜月孤不知千載後還飲雪精無滕閣秋風帝子何年去城頭髙閣間秋風起南浦夕照在西山蕭瑟青蘋末凄清紅蓼間酒闌歌舞散吹送綵雲還東湖夜月月出海東頭澄湖百頃秋人家燈火靜漁艇釣絲收雲浸金波冷星搖素練浮徐亭與蘇圃清景復悠悠章江曉渡江平新水濶月落淡煙橫沙上人初集渡頭天已明青山開霽色白鳥度春聲舟楫無風浪何妨日送迎龍沙夕照龍堆截復環隱映夕陽間落霞迷翠渚霽雪對青山津晚人爭渡林寒鳥獨還漁翁收網去幾箇釣舟間夜宿京口閘水聽無聲沉沉鐵甕城落帆先過壩繫榜得休程地擁南徐壯山連北固橫如何今夜月還似故鄉明聞角銀漏初傳箭長河已挂城忽聞嗚咽弄總是别離情獨客驚秋盡他鄉自月明燈花空有喜對酒不成傾夜坐移席當修竹開軒敞素屏夜分人已靜風入酒微醒促織悲清露飛螢送落星翛然絶塵想何必念郊坰雨後急雨洗炎蒸空齋病骨醒華星粲遙漢明月瞰疏櫺客夢家千里蛩聲露一庭短檠應可問不用聚哀螢題畫聞道稽山好千岩秀色分樹連秦望雨帆入鏡湖雲髙卧留安石能書憶右軍崇虛猶似昔還可問鵝羣對酒效樂天體三首何處難忘酒離人思故鄉青山隨逺道白髮在髙堂絡緯庭前月蒹葭野外霜此時無一盞歸夢引愁長何處難忘酒芭蕉夜雨時罏煙殘翠裊漏水澀銅池窗下拋書倦樽前得句遲此時無一盞燈影獨離離何處難忘酒故人天一隅昨宵驚入夢今日喜收書楚水孤煙外吳霜落木初此時無一盞何以慰離居長垣謁蘧伯玉墓衛昔多君子斯人實我師下車存篤敬寡過在知非荒隴一抔土髙情千載思至今伯玉里遺俗自熙熙次韻胡學士春日陪駕遊萬嵗山十首鳯輦宸遊日祥雲夾道紅香風傳别殿飛翠繞行宫徑轉千岩合波回一鏡空忽看鸞鶴起聲在半天中澗道蒼苔合房櫳繡戶分碧淙晴欲雨錦石暖生雲嘉樹千尋秀靈蒲九節芬廣寒宫闕近天語半空聞山春風日麗景物自多竒露濕竹間草泉侵松下岐落紅飄碎纈空碧罥遊絲登覽逢真境都忘足力疲古木藏幽洞深林映好花擷芳雲欲動涉澗路還賖春色浮瓊島晴光耀翠華誰如玉堂客八餅賜新茶雨晴山色好太液暖浮春遊鯉遙吹浪飛花近著人列筵深寵渥載筆煥絲綸願繼周南作騶虞詠至仁閣道雲為幄仙山玉作臺更無凡迹到只有異香來栁拂金輿度花迎寶扇開太平多樂事扈從得徘徊小山多勝槩傳敕更追遊碧靄浮空起清風似水流樹籠香殿古泉出畫橋幽何處聞天樂瓊林最上頭並立春風裏鶯聲逺度篁碗分金露碧石載紫瓊霜靈籟生岩壑流雲出洞房真成對圖畫樓閣倚青蒼玉梁凌漢逺朱榭入雲髙曲水含蒼霧孤峯聳翠鰲路回經月殿賦就賜春醪盛事千年遇登臨豈憚勞仗外香風起飛花點繡羅柳陰啼翠鳥池曲泛蒼鵝歸路煙霞逈中天雨露多晚來歌吹發雲際轉纎阿監中夜宿秋風灑竹枝涼氣入疏衣鶴背月中冷螢光雨後微紫垣當講席玉漏隔彤闈良夜清如許思親苦夢歸題陳宗淵畫瀑布落雲端松杉六月寒攜琴曾有約涉澗不辭難野水無人渡青山獨坐看此中多逸興投老擬盤桓清口驛夜度清口驛寥寥犬吠幽人家散墟落舟楫倚汀洲薄霧浮空起長河帶月流悲歌何處發不覺動離愁登沛縣歌風臺璽綬歸秦土英雄泣楚垓金湯千里固社稷萬年開故老樽前舞朔風天際來髙歌激雲漢