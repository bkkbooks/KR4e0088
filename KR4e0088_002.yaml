蒼苔古木隂隂寶剎開莫道山中無惠逺時時人訪虎溪來題共節堂卷翠袖天寒雪滿林幾回空咏白頭吟夜深獨有幽閨月照見共薑一寸心送陳宗顯致仕還鄉一别桐鄉已十秋别來相憶思悠悠至今烏石岡頭路並轡多應夢裏遊薰風拂水浪文斜五月輕舟定到家紈扇烏紗行樂處逢人笑折石榴花致仕歸來白髮明麻姑酒熟日頻傾醉時童稚相隨去擊壤康衢有頌聲題靜山詩卷寥寥靈響逺盤空竹上流雲竹下風坐對爐熏無一事青山幾處夕陽紅過揚州舊説揚州天下聞繁華如夢欲銷魂可憐杜牧多情思曾向樽前問紫雲月夜過鍾吾口號兩岸蟲聲夜轉多他鄉無奈月明何碧天萬里河流急倚棹長吟一鴈過下邳日落長河野水昏青山遙望下邳門舟人謾説圯橋近黃石于今廟尚存上吕梁洪亂石穿空疊浪驚烏犍百丈上洪輕扁舟載雨西風急試問徐州一日程細雨斜風拂畫船船頭怪石起蒼煙仰看白浪排空下始信河流逺自天徐州十二詠百步洪九里山前百步洪河流如箭石當空黃頭伐鼓穿洪去宿雨初收日影紅戲馬臺城南一里蓋世英雄酒一杯悲歌只使後人哀平生廢盡屠龍技今日空留戲馬臺華他墓城南一里徒把金針事老瞞千年荒冢朔風寒從來枉卻陳琳檄到底西陵淚不乾亞父冢元時冢有光氣盜發冢得寶劍城南一里三尺青銅盜豈知只因虹貫草萋萋鴻門玉斗空如雪拂袖歸來路已迷向魋墓城北二十里荒丘淺冢草斑斑事在遺經不可刋石槨成來功已竭後人有法説邢山陵母墓城西南一里匆匆窗下取吳鈎使者星馳不肯留遂使鴻毛輕一死却存馬鬛重千秋子房墓城北六十里辟穀何勞祿萬鍾功成志就却辭封分明古墓埋青草始信空言托赤松劉向墓城北二里十年封事遺編在三尺荒丘宿草摧鴻寶浪傳誰見得藜燈一去不重來留城張良所封之地城北百二十里偶然相遇若神交多少竒謀勝六韜辟穀歸來應却掃如何四皓又重勞彭祖樓錫封曾奠大彭墟千古傳來事不虛明月滿樓塵影息仙人曾駕五雲車燕子樓妙舞清歌一夕休繁華銷盡綵雲收多情只有烏衣侶終歲相看不下樓黃樓衮衮河流晝夜馳長懷太守築堤時當年賔客黃樓盛今日荒涼讀斷碑夜過汶上馬尚書墓華表蒼蒼立墓門百年翁仲至今存行人為説尚書墓何處流傳有子孫東平道中白雲飛盡碧天寒夾道青山馬上看最是動人愁思處蟲聲滿地葉聲乾曉過穀城黃石公廟今東阿縣北月落青山露氣清山頭黃石立崢嶸蕭條古廟無燈火惟有西風草木聲題畫四首青山千疊復萬疊碧樹前村連後村釀得松花酒初熟故人相與款柴門碧沙流水漾清溪溪口時聞谷鳥啼兩岸好山明鏡裏扁舟如在越東西逺山凝翠橫溪上流水浮花出石根時有漁舟來復去等間莫認作桃源故園西畔是西山萬壑千岩翠黛環今日看圖隔煙水西風吹夢繞松關過儀真迎鑾驛前江水平落帆過壩暫休程人家兩岸埀楊栁時有飛花拂酒觥載得圖書滿畫船傾壺况復酒如泉東風十里儀真路江水江花亦可憐南北帆檣會此津滿江簫鼓載陽春相逢盡是他鄉客莫厭樽前勸酒頻重過揚州百丈牽江夜未休那知夢裏過揚州春風二月蕃釐觀不為瓊花一少留雷塘吳公臺下是雷塘望斷春山碧草長却笑相逢追往事樽前猶説舞腰傷煬帝問張麗華事見大業拾遺記召伯壩召伯津頭江水斜茅茨竹裏有人家當年謝傅甘棠樹今日春風野草花渺渺湖田草半青鷺鷥風裏立亭亭忽驚船上金笳發飛過春山點畫屏過𨝍溝春草萋萋春水流行人此日過𨝍溝想得都城車駕發五雲繚繞護宸旒重過戲馬臺在徐州拔山力盡楚聲哀戲馬千年尚有臺若使後人傷往事何能更醉菊花杯放鶴亭在徐州石佛山昔者高亭石佛山只今煙暝鳥聲間千年白鶴歸何處惟有文章落世間隱隱青山曉霧開望中誰謂有亭臺山人一去無消息空想仙翁看鶴來題竹一雙琅玕勢千尺滿壁清風動幽室坡翁老可不復見夢入篔簹秋瑟瑟不受紅塵半點侵月中時聽鳯孤吟涔陽望斷蘭旌逺錦瑟一彈秋滿林題子昻書嵇康絶交書飄飄絶俗嵇中散咄咄逼人王右軍書罷瀟然無一事鷗波亭上看晴雲題一片秋意圖二首嫋嫋西風生夕波蕭蕭碧樹得秋多潘郎未就間居賦白髮添來奈爾何欲攬芙蓉上采舟浦雲煙樹隔滄洲眼中秪覺秋光好何事騷人却怨秋舟中縱目二首秫黍蕭蕭弄晚晴朔風吹起鴈行驚牛羊滿野無人問盛世中原見太平長河不斷送行舟百丈遙牽晚未休望盡天涯秋一色蓼花蘆葉水悠悠棹歌一灣一灣復一灣河流百折苦回環歸舟盡日此中去只見黃蘆不見山卜築新成胡學士以詩見寄就韻奉答三首老來隨處作頥庵容膝何妨小似龕終日掩關人迹少絶無雄辨與髙談小小茅齋不厭低頻來乳燕欲銜泥亦知階下難旋馬肯向雲中學養雞百尺髙槐連禁苑絶勝花竹卜郊居樽前興到頻題句客裏官間擬著書題鳴鳩拂羽圖日暖風喧淚竹斑鳴鳩拂羽樹林間眼中正是春光好喚雨呼晴莫等間題故元端本堂殿臣王熙臨宋徽宗雪鴈圖端本堂中酒未銷侍臣圖畫寫前朝豈知夜半征車發雪落沙場鴈影遙聞楊學士士竒卧病賦詩寄簡十首昔年我病公南去公病今令我北思悵望停雲千里隔竹窗樽酒負佳期東里先生懶著書新栽花竹似郊居病來對客無談笑麈尾髙懸室自虛近見緘書到玉堂忽聞伏枕意難忘形容不是緣詩瘦坐卧多因愛竹涼詞垣罷直已多時窗户流塵生硯池事業到頭須努力年過五十未應衰見説新來坐不眠重屏圍暖擁青氊但聞子敬歌桃葉豈有楊枝伴樂天不見堂前雀送鱣只聞幽室藥頻煎越人亦有方堪寄却恐桓矦笑未然聞道維摩面欲焦他鄉相憶客魂消亦知松柏蒼蒼色縱使經霜未肯凋先生何事最關情人道如今太瘦生故舊年來多老大題詩不覺淚縱橫看看臘盡又逢春想見春來氣象新造物小兒徒自苦先生已辦逐儺人昔年染翰共承恩今日看雲憶故人兩鬢蕭蕭空自老不才未有報涓塵松鶴圖為師侍郎賦玉雪森森被羽毛一聲清唳入雲高翛然獨步長松下曾載仙人醉碧桃梅雪金雞圖暗香疏翠曉凄迷正是山中雪漲溪咿喔一聲紅日上滿林驚起衆禽棲題明秀樓江流一碧際長空江上青山秀色重幾度髙樓讀書罷畫闌秋水看芙蓉紫霞碧樹繞滄洲滿目江山入畫樓想得樓中賔客散攜琴還載木蘭舟己亥人日是日壬子上表賀海平二首風不鳴條海不驚千官拜表雪初晴人人共説逢壬子預喜豐年應太平三日東風淑氣生謳歌簫鼓滿都城亦知客裏春盤好還憶西江七寶羮題師侍郎畫四首紅白山花相映開山中徑路久無媒老翁不是看花客只共扁舟載鶴來幾樹埀楊覆水亭雙雙白鳥度雲屏飄然一棹來相訪正是山人午睡醒遙看瀑布落寒青野服烏巾自在行好似匡廬讀書處滿林紅葉夜猿聲千山萬壑凍無聲一棹夷猶溪上行興盡歸來卿莫笑多情何似不留情題平林煙雨圖二首昔從三泖載舟還風起湖心煙滿山白鳥滄波春浩浩暗紅埀緑雨斑斑舊遊長憶在餘干幾對琵琶煙雨寒白髮無情人易老畫中渾似夢中看送胡文善還金華二首蚤登科第入詞垣謁告南歸又拜恩莫向雙溪看明月白雲深處有丘園都門三月栁埀絲歌徹桃夭賦逺歸想得到家春似錦芙蓉孔雀爛生輝題許由棄瓢圖先生髙致出塵囂爵祿曾聞不可邀但使此心如止水當年何必棄􅋯瓢送朱孟德還寧夏五首擔簦負笈出西陲兩度金門射策時今日凄涼歌陟屺客窗清淚只空埀天涯望斷白雲飛灑淚那能賦式微滿路楊花春欲暮不堪飛雪點麻衣念子相從今幾年嵗寒能守舊青氊揚雄已老侯芭去獨立春風思惘然匹馬征衫西入秦行人何處最銷魂夜聽青澗城邊雨曉望烏崘山上雲官道風清雨歇時青山如黛栁如絲丈夫不灑離羣淚無奈于今我已衰題郭文通畫二首千尺長松山館清小橋流水淨無聲落花啼鳥春風後野服烏巾獨自行天際樓臺望欲迷青山雨過緑陰齊扁舟載酒遊何處不是耶溪即剡溪題梅二首冷蕊疏花雪半乾溪風嶺月共盤桓不隨桃李爭春色獨向山林守嵗寒平生雅操冰霜潔一寸芳心鐵石堅莫笑根株空老大年年開向百花先題龔竹鄉手卷詩七首并序故宋尚書吏部侍郎竹鄉龔公墓銘一卷乃廬陵鄧中齊所撰觀其清風偉節具載諸銘獨念自喪亂之表鄉人文獻故家零落無幾公之孫與賢當兵塵澒洞之際寶藏斯銘若敕若公之所為詩文凡若干臨終分舁子孫且曰不獨守斯文而不失尚當思繼其志紹其業乃為賢子孫其視世之分金帛委妻妾者賢不肖為何如今與賢之孫鐩字子諫由科第發身任兵科給事中才且賢他日所就未易涯量持此卷求題因賦七絶以寫其實云公名升字子輝宋理宗朝進士竹鄉其别號也當年捧檄佐湖湘蓮幕風清化日長從此飛騰霄漢近羽儀光采姓名香郎官花縣鳴琴日御史蘭臺袖簡時雕甍繡闥心如水白日青天事不欺袖簡謂彈留夢炎五馬庭前列繡鞍桃花流水興漫漫林間甘露同誰採松下芝英只獨看竹鄉知常德有甘露芝草之瑞敵將南來國事休錢唐王氣一時收英雄多少風塵隔豈獨文山志不酬萬里間關赴行在天官聊復拜崖山當時空有虞淵志龍去滄溟竟不還黃楊山深風露涼徒步歸來問草堂閉門讀書人事絶淡逺閣中荷芰香華表蒼煙鎖墓田竹鄉喬木尚依然承家幸有賢孫子翰墨流傳過百年閲古作寄簡子啓八首詩壇莫笑廉頗老且放長兵接短兵批亢搗虛聊復爾堂堂正正鬼神驚下施雕琢貴天然綺麗猶慚泰始前到得西風塵土淨芙蓉秋水淨涓涓聲律精嚴格調難更兼詞氣有波瀾性情吟咏隨時見雕琢何須刻肺肝險怪雕鎪固驗人何如平淡見天真若教渣滓消融盡自是冰壺不染塵鳯語梧桐鶴唳松龍吟秋水月堂空夜深靈響生銀漢都付奚囊詠不窮李杜詩篇今古豪只緣體裁具風騷崑崙萬折歸滄海到底方知出處髙人愛新竒學晚唐弊貪猶謂作於涼若驅纎巧還純古蘇李當年獨擅場句戀清竒體益卑辭工靡麗氣還萎要知玉振金聲處廣樂鈞天萬舞時戲作次藥名十首老樹兔絲猶獨活破窗故紙豈防風不聞海馬肥羊藿只恐牽半踏鹿蔥碧雪丹砂空想望天門逺志竟蹉跎紅娘不見當歸客老却菖蒲半夏過鍾乳岩前石燕飛空青谷裏麝香肥琅玕芝草應難覔薝蔔薔薇露滿衣啇陸幾年莨蕩子車前馬勒却回鄉預知已有宜男兆夜合頻燒安息香芙蓉露白菊花黃枸杞霜晴橘葉香金線重樓人不見景天海月夜茫茫蚯蚓結來成百合海羊鬬處即蝸牛莫認夏枯為益母須知萱草解忘憂蒼耳藂邊尋馬勃桂花香裏取蟾酥虎頭蝎尾須知避苦酒酸漿不用沽休把天仙同鼠婦可憐地錦雜蛇銜山頭黃檗心知苦井底青鹽味更醎憶别瓊筵蘇合香忍將昆布作衣裳梧桐淚落渾如雨躑躅花開空斷腸香殘薰陸留雲母凍結瓊枝勝水晶海蛤羊蹄都謝却不貪五味谷神清題曺編修茅山攬秀圖四首句金之山鬱嵯峨獨倚髙樓攬秀多苑君乘龍上天去芝草琅玕奈爾何千仞芙蓉秀入天紛紛空翠落簾前山人無事來相訪仙得黃庭內景篇霧閣雲窗隔杳𡨕華陽深處有金經山中楊許今何在多少殘碑斷蘚青風生岩壑度松聲百尺樓頭月正明萬物忘來心似水白雲何事獨關情題畫龍曽將一寸滄溟水化作甘霖遍九垓捲甲歸來能幾日又隨煙霧上蓬萊頤庵文選卷下欽定四庫全書
