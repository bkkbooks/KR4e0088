即自經其女嫁周氏聞父母死痛苦乃鬻其奩裝構橋於所居之旁橋成投橋下亦死時人義之名其橋曰孝烈橋余嘗見疊山與鎦丞相書曰大元治世民物一新宋室舊臣只欠一死鎦丞相即夢炎舉疊山者又嘗見疊山江東十問詞氣慷慨激昻當時之士其忠義之志蓋已素定矣惜其妻女及忠孝之事史皆略之抱疾居間因考前聞遂賦追挽之詩并孝烈橋庶幾忠義不泯俾為人臣為人婦為人子者知所勸云潮遏錢塘王氣收兩宫北去竟誰留褰旗獨倡勤王義當軸曾無負國羞幽憤千年遺涕淚孤忠七日死拘囚江東十問今猶在可惜英雄志不酬右挽謝疊山得脫鯨鯢遂突圍驅馳不解戰時衣此身報國心常在逺道投人事已非一旅奮戈猶敵愾二龍浮海竟何依當時閫帥忠貞士誓死同歸志不違右挽張孝忠父死家亡母自經可憐形影獨娉婷奩金盡散橋初就旅櫬無歸淚輒零自分寒流沉白璧誰從夜月見輜軿一門三節人間少安得穹碑與勒銘右賦孝烈橋閲文山集謾述二首誓死成仁永不忘勤王發憤更鷹揚虞淵日落山河慘吳苑春歸草木長萬里羈囚拋骨肉百年忠義見文章可憐有客王炎午生祭臨風淚幾行二龍南去海茫茫社屋寒來鴈呌霜萬死搴旗還舉義千金脫險竟浮洋都城不泯忠臣祀國論猶傳政事堂志士悲歌多感慨後人誰識謝翺狂寄謝襄城伯惠玄明粉天語丁寧近御筵彩舟同載記當年芝眉長仰雲千里蓬鬢那堪雪一顛玉帳談兵書滿腹玄霜化液汞投鉛山窗忽見緘題至接對令人思惘然寄黃尚書曾共掄材讀卷時中天華蓋漏聲遲金蓮炬暖龍光動寶扇雲開雉尾移樂奏九成班玉佩臚傳多士拜丹墀如今憶著當年事北望橋山淚獨埀士竒少傅以詩及絨縑慶七十次韻奉答二首隔千里兮共明月相思兩地寸心懸仙郎使節來江上少傅題緘自日邊逺荷絨縑溫我老輒將珠玉向人傳已經四百草甲子潦倒徒誇絳叟年千梳白髮如霜染一寸丹心向日懸夢斷雞聲茅屋裏朝回鳯闕綵雲邊夀徴逺致髙賢祝詩句頻煩過客傳靜坐窗前推物理梅梢消息又新年村居即事十首天上歸來葺敝廬買松移竹事幽居喜從鄰里團新社得教兒孫讀舊書芳草池塘清漲溢落花門巷緑陰初莫言疏傅金都盡頗似顔含樂有餘雨霽羣芳各鬭妍傍花隨栁艷陽天何如杜老栖夔府一似王維愛輞川紫燕入簾尋舊壘黃鸝繞樹喜新遷兒童笑謂村居好榆莢飛來滿舍錢日照園林草木新眼前生意足怡神竹根小筍留遮塹牆角枯株析作薪無事自尋顔子樂有蔬莫笑庾郎貧幽居好似王官谷未必今人非古人光風轉蕙日初長旋取菰蒲過小塘桑樹葉柔鳩羽拂橘梢花落燕泥香疏籬編早苔侵砌壞壁修遲筍過牆公子從來善居室人生底事為誰忙了却人緣已白頭卜居喜得林塘幽軒窗小潤值梅雨簾戶輕寒迎麥秋往事經心空有夢此身逺俗自忘憂春歸已是吾歸後怪得啼鵑呌未休山翁採藥西山裏移植白頭遺老家帶土可憐初拆甲連枝還惜未開花渠邊築圃教栽竹牆下分畦賸種茶却笑盧鴻耽逸趣養生不解事桑麻住鄰髙士傍東湖嵗逺人家雜遝居城市從來多湫隘村園新卜儘寬舒薔薇弄影春風裏布穀催耕曉雨餘屋後門前盡農圃間時扶杖看犁鋤異卉竒花旋覔栽便看粉蝶過牆來紫蘭破萼風前吐紅藥翻階雨後開兒子學琴初授譜鄰翁攜酒強銜杯人生得遂幽栖願不管黃雞白日催村居雖僻喜髙明連日雨多陰復晴藥隴引雛雙雉過桑林喚婦一鳩鳴已將履歷同春夢且得清間了此生門外草青人迹少杖藜隨步愜幽情從人説似浣花溪小徑通村路不迷樹底緑陰清藹藹池邊芳草碧萋萋有時門巷來騶從終日園林聽鳥啼抱疾歸休非吏隱兒童莫訝任東西憶昔四首寄士竒勉仁二少傅幼孜少保昔者承恩共拜官兩班分日直金鑾晚來歸舍星同戴曉起趨朝漏未殘墨點龍箋濡綵筆燭傳庭燎捧金盤如今憶著當時事獨望橋山淚不乾聖祖巍巍功德髙曾紬石室筆同操始終纂述多從故事業鋪張敢謂勞丹禁清風傳玉漏瑶階紅日轉金鼇間來極目鈞天上却憶蘭臺愧濫叨聖主崇儒冠古今辟雍遙迓寵光臨百年禮樂昭文運一代儀章著德音釋菜周旋華衮盛授經敷暢講筵深鑾輿一去神遊逺乘石苔封杏樹陰接武青宫列兩坊恩榮兼秩實非常追陪瑣闥春風暖進講文華晝景長每切葵心傾曉日竟同蒲質老秋霜璽書獨拜歸來後留與兒孫永不忘追次虞都御史伯益見寄詩韻二首二憲持衡肅柏臺每瞻丰采獨徘徊片言折獄真能事樽酒論文愧不才落月空梁驚夢覺西風逺道寄詩來料應薊北河冰解正是江南使節回新詩往往見清才懷抱相過幾度開帝座龍顔長共仰天孫鳯錦獨先裁跛牂蹀躞難同驥布鼓尋常恥遇雷今日思君那得見秖應夢裏一能來次韻答楊少傅勉仁二首蕭然一榻病相如獨卧城南水竹居玉笥松楸懷故里青燈風雨課殘書眼前文物交遊少霜後園林橘柚餘藥裏尋常筋力盡敢勞谷口有來車之武平生信不如衰年懷土事幽居山中已迫桑榆景天上重煩故舊書伏枕塵勞灰百念傳家生計在三餘鄰翁花木春來好扶杖看花當小車次答楊少傅士竒見寄二首幽栖已出喧囂外老疾偏憐見在身萬里交遊空對月半生風雨不知春當年玉署曾分直今日烏紗獨製巾共道同時六學士香山居士一間人夢中握手不知勞顧我猶穿舊賜袍茅屋江頭真野老玉堂天上實仙曹每見杜陵懷李白何如若士望盧敖自憐多病雲霄隔敢謂山林遂養髙歌行卯山書屋圖金烏出海扶桑紅流光正照山之東千岩宿霧捲飛翠半壁晴霞明太空一雙喬松蔭華屋中有幽人美如玉青鞋布襪芰荷衣坐看碧草無塵俗黃鸝啼處樹陰多白鳥飛時溪水緑牀頭錦囊琴一張架上牙籖書萬軸長年讀書究典墳不知春暮花